      function renderFamilyMainView() {
        if (!familyMapEl) return

        // ── SVG-based tree renderer ──────────────────────────────────────
        // Node dimensions and spacing
        const NW = 110   // node width
        const NH = 52    // node height (2 lines)
        const HGAP = 24  // horizontal gap between siblings
        const VGAP = 60  // vertical gap between levels
        const LINE = "rgba(209,163,112,0.55)"
        const LW = 2

        // Node spec: { id, label, meta, cls, children[], x, y, w }
        // We compute layout in two passes: measure widths bottom-up, then assign x top-down.

        function makeNode(id, label, meta, cls, children) {
          return { id, label, meta, cls: cls || "", children: children || [] }
        }

        // Build tree structure
        const tree = makeNode("root-couple", "Valdinei + Rafaela", "", "couple", [
          // Left branch: children of the family
          makeNode("family-branch", null, null, "ghost", [
            makeNode("pimpim", "Pimpim", "Irmão", "default", [
              makeNode("isa", "Isa", "Casal", "partner", []),
              makeNode("repeteco", "Repeteco", "Melhor amigo do Pimpim", "partner", []),
            ]),
            makeNode("bento", "Bento", "Irmão", "default", []),
            makeNode("kitty", "Kitty", "Irmã", "default", [
              makeNode("fabinho", "Fabinho", "Casal", "partner", []),
            ]),
            makeNode("betinha-chocks", "Betinha + Chocks", "Núcleo da família", "nucleus", []),
          ]),
          // Right branch: Jorginho (funcionário da Rafaela)
          makeNode("jorginho", "Jorginho", "Funcionário da sogrinha", "default", [
            makeNode("tunico", "Tunico", "Filho do Jorginho", "partner", []),
          ]),
        ])

        // ── Layout engine ─────────────────────────────────────────────────
        // Recursively compute subtree width
        function subtreeWidth(node) {
          if (node.cls === "ghost") {
            // ghost is just a pass-through grouping for horizontal layout
            const total = node.children.reduce((s, c) => s + subtreeWidth(c), 0)
            return total + Math.max(0, node.children.length - 1) * HGAP
          }
          if (node.children.length === 0) return NW
          const childrenW = node.children.reduce((s, c) => s + subtreeWidth(c), 0)
                          + Math.max(0, node.children.length - 1) * HGAP
          return Math.max(NW, childrenW)
        }

        // Assign x (center of each node), y, collect all nodes
        const allNodes = []
        const allEdges = [] // { x1,y1,x2,y2 }

        function layout(node, cx, cy) {
          if (node.cls === "ghost") {
            // ghost: distribute children horizontally, no box
            const totalW = subtreeWidth(node)
            let childX = cx - totalW / 2
            node.children.forEach((child) => {
              const cw = subtreeWidth(child)
              layout(child, childX + cw / 2, cy)
              childX += cw + HGAP
            })
            return
          }

          node.x = cx
          node.y = cy
          node.w = NW
          allNodes.push(node)

          if (node.children.length === 0) return

          const childY = cy + NH + VGAP
          const totalW = node.children.reduce((s, c) => s + subtreeWidth(c), 0)
                       + Math.max(0, node.children.length - 1) * HGAP
          let childX = cx - totalW / 2

          node.children.forEach((child) => {
            const cw = subtreeWidth(child)
            const ccx = childX + cw / 2
            layout(child, ccx, childY)
            // Edge from bottom-center of parent to top-center of child
            // (for ghost children, edge to first real child center handled after)
            if (child.cls !== "ghost") {
              allEdges.push({ x1: cx, y1: cy + NH, x2: ccx, y2: childY })
            } else {
              // edges from parent to each grandchild
              child.children.forEach((gc) => {
                if (gc.x !== undefined) {
                  allEdges.push({ x1: cx, y1: cy + NH, x2: gc.x, y2: gc.y })
                }
              })
            }
            childX += cw + HGAP
          })
        }

        // Root: split into two top-level branches side by side
        // First pass: compute widths
        const leftBranch  = tree.children[0]  // ghost family
        const rightBranch = tree.children[1]  // Jorginho

        const leftW  = subtreeWidth(leftBranch)
        const rightW = subtreeWidth(rightBranch)
        const totalTopW = leftW + rightW + HGAP * 4
        const svgPad = 32
        const svgW = totalTopW + svgPad * 2

        // Root couple node sits above the midpoint of left branch
        const leftCx  = svgPad + leftW / 2
        const rightCx = svgPad + leftW + HGAP * 4 + rightW / 2

        // Root couple Y
        const rootY = svgPad
        const rootCx = (leftCx + rightCx) / 2

        // layout root
        const rootNode = { id: "root-couple", label: "Valdinei  +  Rafaela", meta: "Sogros", cls: "ancestor", children: [], x: rootCx, y: rootY, w: NW + 60 }
        allNodes.push(rootNode)

        // Layout left branch children (level 2)
        const level2Y = rootY + NH + VGAP
        let lx = svgPad
        leftBranch.children.forEach((child) => {
          const cw = subtreeWidth(child)
          const ccx = lx + cw / 2
          layout(child, ccx, level2Y)
          lx += cw + HGAP
        })

        // Connect root to each level-2 left child with a branching connector
        const leftChildren = leftBranch.children.filter(c => c.x !== undefined)
        if (leftChildren.length > 0) {
          const minX = Math.min(...leftChildren.map(c => c.x))
          const maxX = Math.max(...leftChildren.map(c => c.x))
          const barY = level2Y - VGAP / 2
          // vertical from root down to bar
          allEdges.push({ x1: rootCx, y1: rootY + NH, x2: rootCx, y2: barY, noCorner: true })
          // horizontal bar
          allEdges.push({ x1: minX, y1: barY, x2: maxX, y2: barY, noCorner: true })
          // verticals from bar down to each child
          leftChildren.forEach(c => {
            allEdges.push({ x1: c.x, y1: barY, x2: c.x, y2: c.y, noCorner: true })
          })
        }

        // Layout Jorginho branch
        layout(rightBranch, rightCx, level2Y)
        // Connect root to Jorginho
        allEdges.push({ x1: rootCx, y1: rootY + NH, x2: rightCx, y2: level2Y, elbow: true })

        // SVG height: deepest node bottom + padding
        const maxY = allNodes.reduce((m, n) => Math.max(m, n.y + NH), 0)
        const svgH = maxY + svgPad

        // ── Render SVG ────────────────────────────────────────────────────
        function nodeRect(node) {
          const nw = node.w || NW
          return { x: node.x - nw / 2, y: node.y, w: nw, h: NH }
        }

        function nodeCls(cls) {
          const map = {
            ancestor: "rgba(209,163,112,0.22)",
            nucleus:  "rgba(230,185,120,0.22)",
            partner:  "rgba(110,170,125,0.09)",
            default:  "rgba(209,163,112,0.08)",
          }
          const borders = {
            ancestor: "rgba(209,163,112,0.55)",
            nucleus:  "rgba(230,185,120,0.6)",
            partner:  "rgba(140,200,155,0.4)",
            default:  "rgba(209,163,112,0.35)",
          }
          return { fill: map[cls] || map.default, stroke: borders[cls] || borders.default }
        }

        // Build elbow path: parent bottom → corner → child top
        function elbowPath(x1, y1, x2, y2) {
          const my = (y1 + y2) / 2
          return `M${x1},${y1} L${x1},${my} L${x2},${my} L${x2},${y2}`
        }

        // Straight path (used for bar segments)
        function straightPath(x1, y1, x2, y2) {
          return `M${x1},${y1} L${x2},${y2}`
        }

        let svgPaths = ""
        // Draw edges that came from recursive layout (child connections)
        allEdges.forEach(e => {
          const d = e.elbow
            ? elbowPath(e.x1, e.y1, e.x2, e.y2)
            : straightPath(e.x1, e.y1, e.x2, e.y2)
          svgPaths += `<path d="${d}" fill="none" stroke="${LINE}" stroke-width="${LW}" stroke-linecap="round"/>`
        })

        // Also draw child-level edges (from layout recursive calls — already in allEdges)
        // Draw child subtree edges for nodes that have children (non-ghost)
        function drawSubEdges(node) {
          if (!node.children || node.children.length === 0) return
          const childrenReal = node.children.filter(c => c.x !== undefined)
          if (childrenReal.length === 0) return

          if (childrenReal.length === 1) {
            const c = childrenReal[0]
            svgPaths += `<path d="${straightPath(node.x, node.y + NH, c.x, c.y)}" fill="none" stroke="${LINE}" stroke-width="${LW}" stroke-linecap="round"/>`
          } else {
            const minX = Math.min(...childrenReal.map(c => c.x))
            const maxX = Math.max(...childrenReal.map(c => c.x))
            const barY = childrenReal[0].y - VGAP / 2
            svgPaths += `<path d="${straightPath(node.x, node.y + NH, node.x, barY)}" fill="none" stroke="${LINE}" stroke-width="${LW}" stroke-linecap="round"/>`
            svgPaths += `<path d="${straightPath(minX, barY, maxX, barY)}" fill="none" stroke="${LINE}" stroke-width="${LW}" stroke-linecap="round"/>`
            childrenReal.forEach(c => {
              svgPaths += `<path d="${straightPath(c.x, barY, c.x, c.y)}" fill="none" stroke="${LINE}" stroke-width="${LW}" stroke-linecap="round"/>`
            })
          }
          childrenReal.forEach(c => drawSubEdges(c))
        }

        // Clear allEdges and re-draw everything cleanly via drawSubEdges
        svgPaths = ""
        // Root to left-branch children (horizontal bus)
        if (leftChildren.length > 0) {
          const minX = Math.min(...leftChildren.map(c => c.x))
          const maxX = Math.max(...leftChildren.map(c => c.x))
          const barY = level2Y - VGAP / 2
          svgPaths += `<path d="${straightPath(rootCx, rootY + NH, rootCx, barY)}" fill="none" stroke="${LINE}" stroke-width="${LW}" stroke-linecap="round"/>`
          svgPaths += `<path d="${straightPath(minX, barY, maxX, barY)}" fill="none" stroke="${LINE}" stroke-width="${LW}" stroke-linecap="round"/>`
          leftChildren.forEach(c => {
            svgPaths += `<path d="${straightPath(c.x, barY, c.x, c.y)}" fill="none" stroke="${LINE}" stroke-width="${LW}" stroke-linecap="round"/>`
          })
        }

        // Root to Jorginho: elbow
        svgPaths += `<path d="${elbowPath(rootCx, rootY + NH, rightCx, level2Y)}" fill="none" stroke="${LINE}" stroke-width="${LW}" stroke-linecap="round"/>`

        // Recurse for all level-2+ children
        leftBranch.children.forEach(c => drawSubEdges(c))
        drawSubEdges(rightBranch)

        // Nodes as foreignObject
        let svgNodes = ""
        allNodes.forEach(node => {
          const r  = nodeRect(node)
          const cl = nodeCls(node.cls)
          const nameColor = node.cls === "partner" ? "#c8e8d0" : "var(--text)"
          svgNodes += `
            <g>
              <rect x="${r.x}" y="${r.y}" width="${r.w}" height="${r.h}"
                rx="10" ry="10"
                fill="${cl.fill}" stroke="${cl.stroke}" stroke-width="1"/>
              <text x="${node.x}" y="${r.y + 21}" text-anchor="middle"
                font-size="12" font-weight="600" fill="${nameColor}" font-family="inherit">${escapeHtml(node.label)}</text>
              <text x="${node.x}" y="${r.y + 37}" text-anchor="middle"
                font-size="10" fill="rgba(255,255,255,0.42)" font-family="inherit">${escapeHtml(node.meta || "")}</text>
            </g>`
        })

        familyMapEl.innerHTML = `
          <div class="ft-root">
            <div class="ft-head">
              <div class="ft-title">Árvore Genealógica</div>
              <div class="ft-subtitle">Família da Betinha · hierarquia e conexões</div>
            </div>
            <div style="overflow-x:auto; padding: 4px 0 8px;">
              <svg viewBox="0 0 ${svgW} ${svgH}" width="${svgW}" height="${svgH}"
                style="display:block; min-width:${svgW}px; max-width:100%; font-family:inherit;">
                ${svgPaths}
                ${svgNodes}
              </svg>
            </div>
          </div>
        `
      }

      function getWorkflowProgress(workflow) {
        const steps = Array.isArray(workflow?.steps) ? workflow.steps : []
        const total = steps.length
        const completed = steps.filter((step) => step.status === "completed").length
        const running = steps.find((step) => step.status === "in_progress")
        return { total, completed, running }
      }

      function getWorkflowStatusCopy() {
        if (!activeWorkflow) return ""
        const progress = getWorkflowProgress(activeWorkflow)
        if (progress.total === 0) return "Workflow ativo"
        if (progress.running) {
          return `${progress.completed}/${progress.total} etapas concluidas`
        }
        if (progress.completed === progress.total) {
          return "Workflow pronto para encerrar"
        }
        return `${progress.completed}/${progress.total} etapas concluidas`
      }

      function formatWorkflowDate(value) {
        if (!value) return ""
        try {
          return new Date(value).toLocaleString("pt-BR", {
            day: "2-digit",
            month: "2-digit",
            hour: "2-digit",
            minute: "2-digit",
          })
        } catch {
          return ""
        }
      }

      function renderWorkflowPanel() {
        const archivedWorkflow = getArchivedWorkflowForChat(getActiveChatId())

        if (!activeWorkflow) {
          sidebarPanelEl.innerHTML = `
            <div class="workflow-list">
              <div class="sidebar-empty">
                O workflow aparece aqui quando o Chocks cria um plano real para uma tarefa de varias etapas.
              </div>
              ${archivedWorkflow ? `
                <div class="panel-card">
                  <div class="panel-card-title">Workflow arquivado</div>
                  <div class="panel-card-copy">${escapeHtml(archivedWorkflow.goal || "Plano anterior")}</div>
                  <div class="workflow-actions">
                    <button class="listing-action" type="button" data-workflow-action="resume-archived">Retomar no chat</button>
                    <button class="listing-action" type="button" data-workflow-action="clear-archived">Remover arquivo</button>
                  </div>
                </div>
              ` : ""}
            </div>
          `
          sidebarPanelEl.querySelectorAll("[data-workflow-action]").forEach((button) => {
            button.addEventListener("click", () => handleWorkflowAction(button.getAttribute("data-workflow-action")))
          })
          return
        }

        const progress = getWorkflowProgress(activeWorkflow)
        const metaParts = [`${progress.completed}/${progress.total} concluidas`]
        const updatedLabel = formatWorkflowDate(activeWorkflow.updatedAt)
        if (updatedLabel) metaParts.push(`atualizado ${escapeHtml(updatedLabel)}`)

        sidebarPanelEl.innerHTML = `
          <div class="workflow-list">
            <div class="panel-card workflow-header">
              <div class="workflow-title">${escapeHtml(activeWorkflow.goal || "Workflow ativo")}</div>
              ${activeWorkflow.summary ? `<div class="workflow-summary">${escapeHtml(activeWorkflow.summary)}</div>` : ""}
              <div class="workflow-meta">${metaParts.join(" | ")}</div>
              <div class="workflow-actions">
                <button class="listing-action" type="button" data-workflow-action="resume-active">Retomar no chat</button>
                <button class="listing-action" type="button" data-workflow-action="archive">Arquivar</button>
                <button class="listing-action" type="button" data-workflow-action="reset">Resetar</button>
              </div>
            </div>
            <div class="workflow-steps">
              ${activeWorkflow.steps.map((step, index) => {
                const label =
                  step.status === "in_progress" ? "em andamento" :
                  step.status === "completed" ? "concluida" :
                  "pendente"
                return `
                  <div class="workflow-step ${escapeHtml(step.status || "pending")}">
                    <div class="workflow-step-dot"></div>
                    <div class="workflow-step-copy">
                      <div class="workflow-step-label">${escapeHtml(step.text || "Etapa")}</div>
                      <div class="workflow-step-state">${label}</div>
                      <div class="workflow-step-actions">
                        <button class="listing-action" type="button" data-workflow-edit="${escapeHtml(step.id)}">Editar</button>
                        <button class="listing-action" type="button" data-workflow-status="pending" data-workflow-step="${escapeHtml(step.id)}">Pendente</button>
                        <button class="listing-action" type="button" data-workflow-status="in_progress" data-workflow-step="${escapeHtml(step.id)}">Em andamento</button>
                        <button class="listing-action" type="button" data-workflow-status="completed" data-workflow-step="${escapeHtml(step.id)}">Concluir</button>
                        <button class="listing-action" type="button" data-workflow-block="${escapeHtml(step.id)}" data-workflow-index="${index}">Marcar bloqueio</button>
                      </div>
                    </div>
                  </div>
                `
              }).join("")}
            </div>
          </div>
        `

        sidebarPanelEl.querySelectorAll("[data-workflow-action]").forEach((button) => {
          button.addEventListener("click", () => handleWorkflowAction(button.getAttribute("data-workflow-action")))
        })

        sidebarPanelEl.querySelectorAll("[data-workflow-status]").forEach((button) => {
          button.addEventListener("click", () => {
            const stepId = button.getAttribute("data-workflow-step")
            const status = button.getAttribute("data-workflow-status")
            if (!stepId || !status) return
            updateWorkflowStep(stepId, { status })
          })
        })

        sidebarPanelEl.querySelectorAll("[data-workflow-edit]").forEach((button) => {
          button.addEventListener("click", () => {
            const stepId = button.getAttribute("data-workflow-edit")
            if (!stepId) return
            const step = activeWorkflow?.steps?.find((item) => item.id === stepId)
            if (!step) return
            const nextText = window.prompt("Editar etapa:", step.text || "")
            if (!nextText || !nextText.trim()) return
            updateWorkflowStep(stepId, { text: nextText.trim() })
          })
        })

        sidebarPanelEl.querySelectorAll("[data-workflow-block]").forEach((button) => {
          button.addEventListener("click", () => {
            const stepId = button.getAttribute("data-workflow-block")
            const step = activeWorkflow?.steps?.find((item) => item.id === stepId)
            if (!stepId || !step) return
            const note = window.prompt("Descreva o bloqueio:", "")
            if (!note || !note.trim()) return
            updateWorkflowStep(stepId, {
              status: "pending",
              text: `[BLOQUEIO] ${step.text} - ${note.trim()}`,
            })
          })
        })
      }

      async function updateWorkflowStep(stepId, patch) {
        const chatId = getActiveChatId()
        if (!chatId || !stepId) return
        try {
          await requestJson("/tools/run", {
            method: "POST",
            chatId,
            headers: {
              "x-chocks-permission-mode": "auto",
            },
            body: JSON.stringify({
              chatId,
              tool: "workflow_update_step",
              input: {
                id: stepId,
                ...(typeof patch?.text === "string" ? { text: patch.text } : {}),
                ...(typeof patch?.status === "string" ? { status: patch.status } : {}),
              },
              permissionMode: "auto",
              approvedTools: getApprovedToolsForChat(chatId),
            }),
          })
          await loadWorkflowStatus(chatId)
          showToast("Workflow atualizado")
        } catch (error) {
          showToast(`Erro: ${String(error)}`)
        }
      }

      async function handleWorkflowAction(action) {
        const chatId = getActiveChatId()
        if (!chatId || !action) return

        if (action === "resume-active" && activeWorkflow) {
          const focus = activeWorkflow.steps.find((step) => step.status === "in_progress") || activeWorkflow.steps[0]
          const extra = focus ? `Etapa foco: ${focus.text}` : ""
          submitMessage(`Retome esta tarefa com base no workflow atual. ${extra}`.trim(), "chat")
          return
        }

        if (action === "resume-archived") {
          const archived = getArchivedWorkflowForChat(chatId)
          if (!archived) return
          const steps = Array.isArray(archived.steps) ? archived.steps.map((step) => `- ${step.text} [${step.status}]`).join("\n") : ""
          submitMessage(`Retome esta tarefa arquivada:\nObjetivo: ${archived.goal || ""}\n${steps}`.trim(), "chat")
          return
        }

        if (action === "clear-archived") {
          clearArchivedWorkflowForChat(chatId)
          renderSidebarMode()
          showToast("Workflow arquivado removido")
          return
        }

        if (action === "archive") {
          if (!activeWorkflow) return
          setArchivedWorkflowForChat(chatId, {
            ...activeWorkflow,
            archivedAt: new Date().toISOString(),
          })
          try {
            await requestJson("/tools/run", {
              method: "POST",
              chatId,
              headers: {
                "x-chocks-permission-mode": "auto",
              },
              body: JSON.stringify({
                chatId,
                tool: "workflow_clear",
                input: {},
                permissionMode: "auto",
                approvedTools: getApprovedToolsForChat(chatId),
              }),
            })
            await loadWorkflowStatus(chatId)
            showToast("Workflow arquivado")
          } catch (error) {
            showToast(`Erro: ${String(error)}`)
          }
          return
        }

        if (action === "reset") {
          const confirmed = window.confirm("Resetar o workflow desta conversa?")
          if (!confirmed) return
          try {
            await requestJson("/tools/run", {
              method: "POST",
              chatId,
              headers: {
                "x-chocks-permission-mode": "auto",
              },
              body: JSON.stringify({
                chatId,
                tool: "workflow_clear",
                input: {},
                permissionMode: "auto",
                approvedTools: getApprovedToolsForChat(chatId),
              }),
            })
            await loadWorkflowStatus(chatId)
            showToast("Workflow resetado")
          } catch (error) {
            showToast(`Erro: ${String(error)}`)
          }
        }
      }

      function loadChats() {
        return Array.isArray(chatsState) ? chatsState : []
      }

      function saveChats(chats) {
        chatsState = Array.isArray(chats) ? chats : []
      }

      function loadLegacyChatsFromStorage() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY)
          if (!raw) return []
          const parsed = JSON.parse(raw)
          return Array.isArray(parsed) ? parsed : []
        } catch {
          return []
        }
      }

      function getActiveChatId() {
        return localStorage.getItem(ACTIVE_KEY)
      }

      function setActiveChatId(id) {
        localStorage.setItem(ACTIVE_KEY, id)
      }

      function makeTitle(text) {
        const trimmed = String(text || "").trim()
        if (!trimmed) return "Nova conversa"

        const windowsPathMatch = trimmed.match(/[A-Za-z]:[\\/][^\r\n"'?]+?\\([^\\/\r\n"'?]+\.[A-Za-z0-9_-]+)/)
        if (windowsPathMatch?.[1]) {
          return windowsPathMatch[1].slice(0, 36)
        }

        const firstLine = trimmed.split("\n")[0].trim()
        return firstLine ? firstLine.slice(0, 36) : "Nova conversa"
      }

      function createChat(seedTitle = "Nova conversa") {
        const id = `chat_${Date.now()}_${Math.random().toString(16).slice(2, 7)}`
        const chat = { id, title: seedTitle, messages: [] }
        const chats = [chat, ...loadChats()]
        saveChats(chats)
        setActiveChatId(id)
        return chat
      }

      async function requestJson(url, options = {}) {
        const localUser = getLocalUser()
        const settings = loadSettings()
        const approvedTools = getApprovedToolsForChat(options.chatId || getActiveChatId())
        const response = await fetch(url, {
          headers: {
            "Content-Type": "application/json",
            "x-chocks-user-id": localUser.id,
            "x-chocks-display-name": localUser.displayName,
            "x-chocks-full-access": settings.fullAccess ? "true" : "false",
            "x-chocks-permission-mode": settings.permissionMode,
            "x-chocks-approved-tools": approvedTools.join(","),
            ...(options.headers || {}),
          },
          ...options,
        })

        const data = await response.json().catch(() => ({}))
        if (!response.ok) {
          const message = data?.error || `${response.status} ${response.statusText}`
          throw new Error(message)
        }
        return data
      }

      async function refreshChatsFromServer() {
        const data = await requestJson("/conversations")
        const conversations = Array.isArray(data?.conversations) ? data.conversations : []
        saveChats(conversations)

        const activeId = getActiveChatId()
        if (activeId && conversations.some((chat) => chat.id === activeId)) {
          return conversations
        }

        if (conversations[0]?.id) {
          setActiveChatId(conversations[0].id)
        }

        return conversations
      }

      async function migrateLegacyChatsIfNeeded() {
        const existingChats = await refreshChatsFromServer()
        if (existingChats.length > 0) return existingChats

        const legacyChats = loadLegacyChatsFromStorage()
        if (legacyChats.length === 0) return existingChats

        for (const legacyChat of legacyChats) {
          const normalizedChat = {
            id: legacyChat.id || `chat_${Date.now()}_${Math.random().toString(16).slice(2, 7)}`,
            title: legacyChat.title || "Nova conversa",
            messages: Array.isArray(legacyChat.messages) ? legacyChat.messages : [],
          }
          await requestJson(`/conversations/${encodeURIComponent(normalizedChat.id)}`, {
            method: "PUT",
            body: JSON.stringify(normalizedChat),
          })
        }

        return refreshChatsFromServer()
      }

      async function persistChat(chat) {
        const data = await requestJson(`/conversations/${encodeURIComponent(chat.id)}`, {
          method: "PUT",
          body: JSON.stringify(chat),
        })
        if (data?.conversation) {
          upsertChat(data.conversation)
          return data.conversation
        }
        return chat
      }

      function getActiveChat() {
        const chats = loadChats()
        const activeId = getActiveChatId()
        return chats.find((chat) => chat.id === activeId) || chats[0] || null
      }

      async function renameChat(chatId) {
        const chats = loadChats()
        const chat = chats.find((item) => item.id === chatId)
        if (!chat) return
        const nextTitle = window.prompt("Novo nome da conversa:", chat.title || "Nova conversa")
        if (!nextTitle) return
        const title = nextTitle.trim() || "Nova conversa"
        chat.title = title
        saveChats(chats)
        await requestJson(`/conversations/${encodeURIComponent(chatId)}`, {
          method: "PATCH",
          body: JSON.stringify({ title }),
        })
        renderApp()
        showToast("Conversa renomeada")
      }

      async function duplicateChat(chatId) {
        const chats = loadChats()
        const chat = chats.find((item) => item.id === chatId)
        if (!chat) return
        const nextId = `chat_${Date.now()}_${Math.random().toString(16).slice(2, 7)}`
        const data = await requestJson(`/conversations/${encodeURIComponent(chatId)}/duplicate`, {
          method: "POST",
          body: JSON.stringify({ id: nextId }),
        })
        const copy = data?.conversation
        if (!copy) throw new Error("falha ao duplicar conversa")
        saveChats([copy, ...chats])
        setActiveChatId(copy.id)

      async function deleteChat(chatId) {

          method: "DELETE",
        })
        clearChatApprovals(chatId)
        clearArchivedWorkflowForChat(chatId)
        const nextChats = chats.filter((item) => item.id !== chatId)
        saveChats(nextChats)
        openMenuChatId = null

        if (nextChats.length === 0) {

          await requestJson("/conversations", {

        }

        showToast("Conversa excluida")
      }

      function upsertChat(updatedChat) {
        const chats = loadChats()
        const index = chats.findIndex((chat) => chat.id === updatedChat.id)
        if (index === -1) chats.unshift(updatedChat)
        else chats[index] = updatedChat

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;")
      }

      function tryParseJson(text) {
        if (typeof text !== "string") return null
        const trimmed = text.trim()
        if (!trimmed) return null
        try {
          return JSON.parse(trimmed)
        } catch {
          return null
        }
      }

      function formatTraceText(text) {
        const parsed = tryParseJson(text)
        if (parsed === null) return escapeHtml(text || "")
        return escapeHtml(JSON.stringify(parsed, null, 2))
      }

      function isPermissionBlockedOutput(text) {
        const parsed = tryParseJson(text)
        return !!(parsed && parsed.ok === false && typeof parsed.error === "string" && parsed.error.includes("permission blocked:"))
      }

      function getToolUiMeta(tool) {
        const normalized = String(tool || "").trim()
        const map = {
          file_read: { label: "Lendo arquivo", noun: "leitura de arquivo", destructive: false },
          file_write: { label: "Salvando arquivo", noun: "gravacao de arquivo", destructive: false },
          file_edit: { label: "Editando arquivo", noun: "edicao de arquivo", destructive: false },
          file_copy: { label: "Copiando item", noun: "copia de item", destructive: false },
          file_delete: { label: "Excluindo arquivo", noun: "exclusao de arquivo", destructive: true },
          file_move: { label: "Movendo item", noun: "movimentacao de item", destructive: true },
          directory_create: { label: "Criando pasta", noun: "criacao de pasta", destructive: false },
          glob: { label: "Buscando arquivos", noun: "busca de arquivos", destructive: false },
          grep: { label: "Procurando no conteudo", noun: "busca no conteudo", destructive: false },
          bash_exec: { label: "Executando comando", noun: "execucao de comando", destructive: true },
          web_fetch: { label: "Acessando web", noun: "acesso web", destructive: false },
          todo_list: { label: "Lendo tarefas", noun: "leitura de tarefas", destructive: false },
          todo_add: { label: "Criando tarefa", noun: "criacao de tarefa", destructive: false },
          todo_update: { label: "Atualizando tarefa", noun: "atualizacao de tarefa", destructive: false },
          workflow_get: { label: "Lendo workflow", noun: "leitura de workflow", destructive: false },
          workflow_replace: { label: "Atualizando workflow", noun: "atualizacao de workflow", destructive: false },
          workflow_update_step: { label: "Atualizando etapa", noun: "atualizacao de etapa", destructive: false },
          workflow_clear: { label: "Limpando workflow", noun: "limpeza de workflow", destructive: false },
          env_get: { label: "Lendo ambiente", noun: "leitura de ambiente", destructive: false },
          pwd: { label: "Lendo pasta atual", noun: "leitura da pasta atual", destructive: false },
          ls_safe: { label: "Listando pasta", noun: "listagem de pasta", destructive: false },
        }
        return map[normalized] || { label: normalized, noun: normalized, destructive: false }
      }

      function formatToolExecutionMessage(tool, result, args) {
        const toolMeta = getToolUiMeta(tool)
        if (!result?.ok) {
          const errorText = typeof result?.error === "string" ? result.error : "A acao falhou."
          return `Acao autorizada, mas houve erro em ${toolMeta.noun}.\n\n${errorText}`
        }

        const output = result?.output

        if (tool === "file_delete" && output?.deleted) {
          return `Acao autorizada. Arquivo excluido: ${output.path}.`
        }

        if (tool === "file_write" && output?.path) {
          return `Acao autorizada. Arquivo salvo: ${output.path}.`
        }

        if (tool === "file_edit" && output?.changed) {
          return `Acao autorizada. Arquivo atualizado: ${output.path}.`
        }

        if (tool === "file_move" && output?.to_path) {
          return `Acao autorizada. Item movido para: ${output.to_path}.`
        }

        if (tool === "file_copy" && output?.to_path) {
          return `Acao autorizada. Item copiado para: ${output.to_path}.`
        }

        if (tool === "directory_create" && output?.path) {
          return `Acao autorizada. Pasta criada: ${output.path}.`
        }

        if (tool === "bash_exec" && output) {
          const stdout = String(output.stdout || "").trim()
          const stderr = String(output.stderr || "").trim()
          if (stdout) return `Acao autorizada. Comando executado com sucesso.\n\n${stdout}`
          if (stderr) return `Acao autorizada. O comando retornou:\n\n${stderr}`
          return "Acao autorizada. Comando executado."
        }

        if (tool === "web_fetch" && output?.status) {
          return `Acao autorizada. Requisicao concluida com status ${output.status}.`
        }

        if (tool === "ls_safe" && output?.path) {
          return `Acao autorizada. Pasta listada: ${output.path}.`
        }

        if (tool === "file_read" && typeof output === "string") {
          return `Acao autorizada. Conteudo de ${args?.path || "arquivo"}:\n\n${output}`
        }

        return `Acao autorizada. ${toolMeta.label} concluido com sucesso.`
      }

      function getBlockedPermissionRequest(message) {
        const trace = Array.isArray(message?.trace) ? message.trace : []
        const toolCalls = new Map()

        trace.forEach((entry) => {
          if (entry?.type === "tool_call") {
            toolCalls.set(entry.call_id, entry.name)
            return
          }
          if (entry?.type !== "tool_output") return
          if (!isPermissionBlockedOutput(String(entry.output || ""))) return

          const toolName = toolCalls.get(entry.call_id) || "acao"
          const args = toolCalls.has(entry.call_id)
            ? trace.find((item) => item?.type === "tool_call" && item.call_id === entry.call_id)?.arguments || "{}"
            : "{}"

          return { toolName, args }
        })

        for (let index = trace.length - 1; index >= 0; index -= 1) {
          const entry = trace[index]
          if (entry?.type !== "tool_output") continue
          if (!isPermissionBlockedOutput(String(entry.output || ""))) continue
          const toolName = toolCalls.get(entry.call_id) || "acao"
          const toolCall = trace.find((item) => item?.type === "tool_call" && item.call_id === entry.call_id)
          return {
            toolName,
            args: toolCall?.arguments || "{}",
          }
        }

        return null
      }

      async function appendToolExecutionResult(chatId, tool, args, result) {
        const chats = loadChats()
        const chat = chats.find((item) => item.id === chatId)
        if (!chat) return null

        const callId = `approved_${Date.now()}`
        chat.messages.push({
          role: "agent",
          content: formatToolExecutionMessage(tool, result, args),
          trace: [
            { type: "tool_call", name: tool, call_id: callId, arguments: JSON.stringify(args || {}) },
            { type: "tool_output", call_id: callId, output: JSON.stringify(result || {}) },
          ],
          streaming: false,
        })
        upsertChat(chat)
        await persistChat(chat)
        await loadWorkflowStatus(chatId)
        renderApp()
        return chat
      }

      async function continueAfterApproval(chatId, tool, args) {
        let chat = getActiveChat()
        if (!chat || chat.id !== chatId) {
          const chats = loadChats()
          chat = chats.find((item) => item.id === chatId) || null
        }
        if (!chat) return

        const toolMeta = getToolUiMeta(tool)
        chat.messages.push({ role: "agent", content: "", trace: [], streaming: true })
        upsertChat(chat)
        renderApp()
        await persistChat(chat)

        isStreaming = true
        activeStreamAbortController = new AbortController()
        syncStreamingUi()

        const requestMessages = [
          ...buildApiMessages(chat),
          {
            role: "user",
            content: `Permissao concedida para ${toolMeta.noun} com os argumentos ${JSON.stringify(args || {})}. Continue a tarefa a partir do resultado mais recente sem repetir o que ja foi feito.`,
          },
        ]

        try {
          await consumeChatStream(chat.id, requestMessages, activeStreamAbortController.signal)
        } catch (error) {
          chat = getActiveChat() || chat
          const lastMessage = chat.messages[chat.messages.length - 1]
          if (lastMessage?.role === "agent") {
            if (String(error).includes("AbortError")) {
              lastMessage.content = `${lastMessage.content || ""}\n\n[resposta cancelada]`.trim()
            } else {
              lastMessage.content = `Erro: ${String(error)}`
            }
            lastMessage.trace = []
            lastMessage.streaming = false
          } else {
            chat.messages.push({ role: "agent", content: `Erro: ${String(error)}`, trace: [], streaming: false })
          }
          upsertChat(chat)
          await persistChat(chat)
          renderApp()
        } finally {
          isStreaming = false
          activeStreamAbortController = null
          const latestChat = getActiveChat()
          const latestMessage = latestChat?.messages?.[latestChat.messages.length - 1]
          if (latestMessage?.role === "agent") {
            latestMessage.streaming = false
            upsertChat(latestChat)
            await persistChat(latestChat)
          }
          syncStreamingUi()
          await loadWorkflowStatus(chatId)
          renderApp()
        }
      }

      async function handleApprovalAction(chatId, encodedTool, encodedArgs, buttonEl, allowAlways = false) {
        const tool = decodeURIComponent(encodedTool)

        try {
          args = JSON.parse(decodeURIComponent(encodedArgs) || "{}")

        }

        if (button) {

      function buildListingMessage(targetPath, entries) {
        const normalizedPath = String(targetPath || "")
        const title = /(^|[\\/])(desktop|area de trabalho)$/iu.test(normalizedPath) ? "Area de Trabalho" : "Pasta"
        const sortedEntries = Array.isArray(entries)
          ? [...entries].sort((a, b) => {
              if (a?.type !== b?.type) return a?.type === "dir" ? -1 : 1
              return String(a?.name || "").localeCompare(String(b?.name || ""), "pt-BR", { sensitivity: "base" })
            })
          : []
        const lines = sortedEntries.map((entry) => `${entry.type === "dir" ? "Pasta" : "Arquivo"}  ${entry.name}`)
        const summary = `${sortedEntries.length} ${sortedEntries.length === 1 ? "item encontrado" : "itens encontrados"}`
        return `${title}\n${targetPath}\n\n${summary}\n\n${lines.join("\n") || "Vazia."}`
      }

      function buildPathCrumbs(targetPath) {
        const normalized = String(targetPath || "").trim()
        if (!normalized) return []
        const windowsMatch = normalized.match(/^([A-Za-z]:)(.*)$/u)
        if (!windowsMatch) return [{ label: normalized, path: normalized }]

        const drive = windowsMatch[1]
        const remainder = windowsMatch[2] || ""
        const parts = remainder.split(/[\\/]+/u).filter(Boolean)
        const crumbs = [{ label: drive, path: drive }]
        let currentPath = drive
        for (const part of parts) {
          currentPath = `${currentPath}\\${part}`
          crumbs.push({ label: part, path: currentPath })
        }
        return crumbs
      }

      function buildDownloadUrl(pathText) {
        const query = encodeURIComponent(pathText)
        const settings = loadSettings()
        const fullAccess = settings.fullAccess ? "&fullAccess=true" : ""
        return `/files/download?path=${query}&permissionMode=auto${fullAccess}`
      }

      function buildRawUrl(pathText) {
        const query = encodeURIComponent(pathText)
        const settings = loadSettings()
        const fullAccess = settings.fullAccess ? "&fullAccess=true" : ""
        return `/files/raw?path=${query}&permissionMode=auto${fullAccess}`
      }

      function createSiblingCopyPath(pathText, suffix = "_copia") {
        const source = String(pathText || "")
        const slashIndex = Math.max(source.lastIndexOf("\\"), source.lastIndexOf("/"))
        const parent = slashIndex >= 0 ? source.slice(0, slashIndex) : ""
        const name = slashIndex >= 0 ? source.slice(slashIndex + 1) : source
        const dotIndex = name.lastIndexOf(".")
        const base = dotIndex > 0 ? name.slice(0, dotIndex) : name
        const ext = dotIndex > 0 ? name.slice(dotIndex) : ""
        const nextName = `${base}${suffix}${ext}`
        return parent ? `${parent}\\${nextName}` : nextName
      }

      function buildRelativePath(basePath, relativeSegment) {
        const base = String(basePath || "").replace(/[\\\/]+$/u, "")
        const segment = String(relativeSegment || "").trim()
        if (!segment) return ""
        if (/^[A-Za-z]:[\\/]/.test(segment)) return segment
        return `${base}\\${segment.replace(/^[\\\/]+/u, "")}`
      }

      function triggerListingAction(action, targetPath, chatId, messageIndex, currentListingPath) {
        const pathText = decodeURIComponent(String(targetPath || "")).trim()
        const currentPath = decodeURIComponent(String(currentListingPath || "")).trim()
        if (!pathText) return

        if (action === "copy") {
          copyTextToClipboard(pathText)
          return
        }

        if (action === "download") {
          window.open(buildDownloadUrl(pathText), "_blank", "noopener,noreferrer")
          return
        }

        if (action === "read") {
          openFilePreview(pathText, false)
          setWorkspaceMode("files")
          renderApp()
          return
        }

        if (action === "edit") {
          openFilePreview(pathText, true)
          setWorkspaceMode("files")
          renderApp()
          return
        }

        if (action === "duplicate") {
          const suggested = createSiblingCopyPath(pathText)
          openRenameModal(pathText, (nextPath) => {
            handleDirectListingTool("file_copy", { from_path: pathText, to_path: nextPath.trim() }, "Duplicar item", {
              chatId,
              messageIndex,
              refreshPath: currentPath || pathText.replace(/[\\/][^\\/]+$/u, ""),
            })
          })
          renameNewEl.value = suggested
          renameNewEl.focus()
          return
        }

        if (action === "open") {
          handleDirectListingTool("ls_safe", { path: pathText }, "Abrir pasta", {
            chatId,
            messageIndex,
            replaceListing: true,
            replacePath: pathText,
          })
          return
        }

        if (action === "up") {
          if (!pathText) return
          handleDirectListingTool("ls_safe", { path: pathText }, "Abrir pasta", {
            chatId,
            messageIndex,
            replaceListing: true,
            replacePath: pathText,
          })
          return
        }

        if (action === "rename") {
          openRenameModal(pathText, (newName) => {
            const parentDir = pathText.replace(/[\\/][^\\/]+$/u, "")
            const nextPath = parentDir ? `${parentDir}/${newName.trim()}` : newName.trim()
            handleDirectListingTool("file_move", { from_path: pathText, to_path: nextPath }, `Renomear para ${newName.trim()}`, {
              chatId,
              messageIndex,
              refreshPath: currentPath || parentDir,
            })
          })
          return
        }

        if (action === "move") {
          const nextPath = window.prompt("Mover para qual caminho?", pathText)
          if (!nextPath || !nextPath.trim()) return
          handleDirectListingTool("file_move", { from_path: pathText, to_path: nextPath.trim() }, "Mover item", {
            chatId,
            messageIndex,
            refreshPath: currentPath || pathText.replace(/[\\/][^\\/]+$/u, ""),
          })
          return
        }

        if (action === "mkdir") {
          const nextPath = window.prompt("Nome ou caminho da nova pasta:", pathText)
          if (!nextPath || !nextPath.trim()) return
          handleDirectListingTool("directory_create", { path: nextPath.trim() }, "Criar pasta", {
            chatId,
            messageIndex,
            refreshPath: currentPath || pathText,
          })
          return
        }

        if (action === "delete") {
          const confirmed = window.confirm(`Excluir "${pathText}"?`)
          if (!confirmed) return
          handleDirectListingTool("file_delete", { path: pathText }, "Excluir arquivo", {
            chatId,
            messageIndex,
            refreshPath: currentPath || pathText.replace(/[\\/][^\\/]+$/u, ""),
          })
          return
        }

        const prompts = {
          list: `liste a pasta "${pathText}"`,
        }

        const prompt = prompts[action]
        if (!prompt) return
        submitMessage(prompt, "chat")
      }

      async function handleDirectListingTool(tool, input, actionLabel, options = {}) {
        const chatId = options.chatId || getActiveChatId()
        if (!chatId) return

        try {
          const result = await requestJson("/tools/run", {
            method: "POST",
            chatId,
            headers: {
              "x-chocks-permission-mode": "auto",
            },
            body: JSON.stringify({
              chatId,
              tool,
              input,
              permissionMode: "auto",
              approvedTools: getApprovedToolsForChat(chatId),
            }),
          })
          if (result?.ok && options.replaceListing) {
            await replaceListingMessage(chatId, options.messageIndex, options.replacePath || input?.path || ".", result)
            showToast(`${actionLabel} concluido`)
            return
          }

          if (result?.ok && options.refreshPath) {
            await refreshListingMessage(chatId, options.messageIndex, options.refreshPath)
            showToast(`${actionLabel} concluido`)
            return
          }

          await appendToolExecutionResult(chatId, tool, input, result)
          showToast(`${actionLabel} concluido`)
          if (result?.ok && options.continueAfter === true) {
            await continueAfterApproval(chatId, tool, input)
          }
        } catch (error) {
          const message = String(error)
          if (message.includes("permission blocked:")) {
            showToast("Acao bloqueada pelas permissoes atuais. Abra Config para liberar por categoria ou por tool.")
            return
          }
          showToast(`Erro: ${message}`)
        }
      }

      window.handleApprovalAction = handleApprovalAction
      window.dismissPermissionRequest = dismissPermissionRequest
      window.triggerListingAction = triggerListingAction

                      </div>
                      <div class="swarm-team-actions">
                        <button class="listing-action" type="button" data-swarm-spawn="${escapeHtml(teamName)}" data-team-key="${teamKey}">Spawn</button>
                      </div>
                    </div>
                    <div class="panel-card" style="margin-top: 10px;">
                      <div class="panel-card-title">Mailbox</div>

                        <select id="swarm-mailbox-agent-${teamKey}">

            <div class="panel-card-copy">${enabled ? "Ativo" : "Desativado"}</div>
            <div class="panel-card-copy">${escapeHtml(String(modeData?.hint || ""))}</div>

        panelEl.querySelector("#coordinator-run-btn")?.addEventListener("click", async () => {
          const messageEl = panelEl.querySelector("#coordinator-message")
          const conversationEl = panelEl.querySelector("#coordinator-conversation-id")
          const resultEl = panelEl.querySelector("#coordinator-result")
          const userMessage = messageEl instanceof HTMLTextAreaElement ? messageEl.value.trim() : ""
          const chatId = conversationEl instanceof HTMLInputElement ? conversationEl.value.trim() : ""
          if (!userMessage) {
            showToast("Informe a tarefa")
            return
          }
          try {
            const response = await fetch("/api/coordinator/orchestrate", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ userMessage, chatId: chatId || undefined }),
            })
            const payload = await response.json().catch(() => ({}))
            if (!response.ok) throw new Error(payload?.error || "falha ao orquestrar")

            if (resultEl) {
              resultEl.innerHTML = `
                <div><strong>conversationId:</strong> ${escapeHtml(String(payload.conversationId || ""))}</div>
                <div style="margin-top:6px;"><strong>Synthesis:</strong> ${escapeHtml(String(payload.synthesis || ""))}</div>
              `
            }
            if (conversationEl instanceof HTMLInputElement && payload?.conversationId) {
              conversationEl.value = String(payload.conversationId)
            }
            showToast("Coordinator executado")
          } catch (error) {
            if (resultEl) resultEl.textContent = `Erro: ${String(error)}`
            showToast("Erro no coordinator")
          }

        panelEl.querySelector("#coordinator-history-btn")?.addEventListener("click", async () => {
          const conversationEl = panelEl.querySelector("#coordinator-history-conversation")
          const outputEl = panelEl.querySelector("#coordinator-history-output")
          const conversationId = conversationEl instanceof HTMLInputElement ? conversationEl.value.trim() : ""
          if (!conversationId) {
            showToast("Informe conversationId")
            return
          }
          try {
            const tasksResp = await fetch(`/api/coordinator/tasks/${encodeURIComponent(conversationId)}`)
            const tasksPayload = await tasksResp.json().catch(() => ({}))
            if (!tasksResp.ok) throw new Error(tasksPayload?.error || "falha ao carregar tasks")
            const tasks = Array.isArray(tasksPayload?.tasks) ? tasksPayload.tasks : []
            if (tasks.length === 0) {
              if (outputEl) outputEl.textContent = "Sem tasks para esta conversa."
              return
            }

            const items = await Promise.all(
              tasks.slice(0, 8).map(async (task) => {
                const taskId = String(task.id || task.task_id || "")
                const subResp = await fetch(`/api/coordinator/tasks/${encodeURIComponent(conversationId)}/${encodeURIComponent(taskId)}`)
                const subPayload = await subResp.json().catch(() => ({}))
                const subtasks = Array.isArray(subPayload?.subtasks) ? subPayload.subtasks : []
                return `
                  <div style="margin-bottom:8px;padding:8px;border:1px solid var(--line-soft);border-radius:8px;">
                    <div><strong>${escapeHtml(taskId || "task")}</strong></div>
                    <div style="color:var(--muted);font-size:12px;">${escapeHtml(String(task.status || ""))}</div>
                    <div style="font-size:12px;">Subtasks: ${subtasks.length}</div>
                  </div>
                `
              }),
            )
            if (outputEl) outputEl.innerHTML = items.join("")
          } catch (error) {
            if (outputEl) outputEl.textContent = `Erro: ${String(error)}`
            showToast("Erro ao carregar historico")
          }
        })

        syncNavButtons()
      }

      function renderRecentList() {
        const chats = loadChats()
        const activeId = getActiveChatId()
        recentListEl.innerHTML = ""
        const filteredChats = chats.filter((chat) => {
          if (!searchQuery) return true
          return String(chat.title || "").toLowerCase().includes(searchQuery.toLowerCase())
        })

        if (filteredChats.length === 0) {
          recentListEl.innerHTML = `<div class="recent-empty">${searchQuery ? "Nenhuma conversa encontrada" : "Nenhuma conversa ainda"}</div>`
          return
        }

        filteredChats.forEach((chat) => {
          const button = document.createElement("button")
          button.type = "button"
          button.className = `recent-item${chat.id === activeId ? " active" : ""}`
          button.innerHTML = `
            <span class="recent-label">${escapeHtml(chat.title || "Nova conversa")}</span>
            <button class="recent-more" data-menu="${chat.id}" type="button">...</button>
            <div class="menu" data-menu-panel="${chat.id}" ${openMenuChatId === chat.id ? "" : "hidden"}>
              <button class="menu-item" data-action="rename" data-chat-id="${chat.id}" type="button">Renomear</button>
              <button class="menu-item" data-action="duplicate" data-chat-id="${chat.id}" type="button">Duplicar</button>
              <button class="menu-item danger" data-action="delete" data-chat-id="${chat.id}" type="button">Excluir</button>
            </div>
          `
          button.addEventListener("click", () => {
            setActiveChatId(chat.id)
            openMenuChatId = null
            loadWorkflowStatus(chat.id)
            renderApp()
          })

          const menuButton = button.querySelector(`[data-menu="${chat.id}"]`)
          menuButton.addEventListener("click", (event) => {
            event.stopPropagation()
            openMenuChatId = openMenuChatId === chat.id ? null : chat.id
            renderRecentList()
          })

          const menuItems = button.querySelectorAll("[data-action]")
          menuItems.forEach((item) => {
            item.addEventListener("click", async (event) => {
              event.stopPropagation()
              const action = item.getAttribute("data-action")
              const targetChatId = item.getAttribute("data-chat-id")
              if (!targetChatId) return
              try {
                if (action === "rename") await renameChat(targetChatId)
                if (action === "duplicate") await duplicateChat(targetChatId)
                if (action === "delete") await deleteChat(targetChatId)
              } catch (error) {
                showToast(`Erro: ${String(error)}`)
              }
            })
          })

          recentListEl.appendChild(button)
        })
      }

      function closeSearch(clearQuery = false) {
        searchOpen = false
        searchButtonEl.classList.remove("active")
        if (clearQuery) {
          searchQuery = ""
          searchInputEl.value = ""
        }
      }

      function openSearch() {
        searchOpen = true
        setWorkspaceMode("conversations")
      }

      function syncNavButtons() {
        navButtons.forEach((button) => button.classList.remove("active"))
        if (searchOpen) {
          searchButtonEl.classList.add("active")
          return
        }
        if (getWorkspaceMode() === "conversations") {
          newChatButtonEl.classList.add("active")
        }
      }

      function renderSidebarMode() {
        const mode = getWorkspaceMode()
        const showingConversations = mode === "conversations"

        workspaceButtons.forEach((button) => {
          button.classList.toggle("active", button.dataset.workspace === mode)
        })

        if (!showingConversations) {
          closeSearch(false)
        }

        recentListEl.hidden = !showingConversations
        searchWrapEl.hidden = !showingConversations || !searchOpen
        sidebarPanelEl.hidden = showingConversations

        if (showingConversations) {
          sidebarPanelEl.innerHTML = ""
        } else {
          recentListEl.innerHTML = ""
        }

        if (showingConversations) {
          sidebarSectionTitleEl.textContent = searchOpen ? "Buscar" : "Recentes"
          renderRecentList()
          syncNavButtons()
          return
        }

        if (mode === "code" && toolStatuses.length > 0) {
          sidebarSectionTitleEl.textContent = "Ferramentas"
          sidebarPanelEl.innerHTML = `
            <div class="tool-list">
              ${toolStatuses
                .map((tool) => {
                  const stateClass = tool.enabled ? "enabled" : "disabled"
                  const stateLabel = tool.enabled ? "ativa" : "desativada"
                  return `
                    <div class="tool-item">
                      <div class="tool-header">
                        <div class="tool-name">${escapeHtml(getToolUiMeta(tool.name).label)}</div>
                        <div class="tool-state ${stateClass}">${stateLabel}</div>
                      </div>
                      <div class="tool-meta">Categoria: ${escapeHtml(tool.category)}</div>
                      ${tool.reason ? `<div class="tool-meta">${escapeHtml(tool.reason)}</div>` : ""}
                    </div>
                  `
                })
                .join("")}
            </div>
          `
          syncNavButtons()
          return
        }

        if (mode === "files") {
          sidebarSectionTitleEl.textContent = "Arquivos"
          renderFileBrowserPanel()
          syncNavButtons()
          return
        }

        if (mode === "workflow") {
          sidebarSectionTitleEl.textContent = "Workflow"
          renderWorkflowPanel()
          syncNavButtons()
          return
        }

        if (mode === "family") {
          sidebarSectionTitleEl.textContent = "Familia"
          sidebarPanelEl.innerHTML = ""
          sidebarPanelEl.hidden = true
          syncNavButtons()
          return
        }

        if (mode === "swarm") {
          syncNavButtons()
          return
        }

        if (mode === "coordinator") {
          syncNavButtons()
          return
        }

        if (mode === "plugins") {
          syncNavButtons()
          return
        }

        if (mode === "monitor") {
          syncNavButtons()
          return
        }

        const approvedTools = getApprovedToolsForChat(chatId)

            const chips = Array.isArray(card.chips)
              ? `<div class="panel-chip-row">${card.chips.map((chip) => `<span class="panel-chip">${escapeHtml(chip)}</span>`).join("")}</div>`
              : ""
