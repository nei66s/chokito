<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Chocks</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Literata:opsz,wght@7..72,500;7..72,600&family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap");

      :root {
        --bg: #23211f;
        --sidebar: #1d1b19;
        --panel: #2b2926;
        --panel-soft: #262421;
        --panel-strong: #32302d;
        --line: rgba(255, 255, 255, 0.12);
        --line-soft: rgba(255, 255, 255, 0.07);
        --text: #f6f1e8;
        --muted: #b9b1a5;
        --muted-soft: #8f887d;
        --accent: #d4a776;
        --accent-soft: rgba(212, 167, 118, 0.16);
        --surface-glass: rgba(255, 255, 255, 0.03);
        --surface-raise: rgba(255, 255, 255, 0.05);
        --scroll-track: rgba(255, 255, 255, 0.04);
        --scroll-thumb: rgba(212, 167, 118, 0.56);
        --scroll-thumb-hover: rgba(212, 167, 118, 0.76);
        --shadow: 0 20px 44px rgba(0, 0, 0, 0.3);
        --shadow-soft: 0 8px 22px rgba(0, 0, 0, 0.22);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        height: 100%;
      }

      [hidden] {
        display: none !important;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: "Manrope", system-ui, sans-serif;
        overflow: hidden;
        scrollbar-color: var(--scroll-thumb) var(--scroll-track);
        letter-spacing: 0.01em;
        position: relative;
      }

      body::before,
      body::after {
        content: "";
        position: fixed;
        z-index: -1;
        pointer-events: none;
      }

      body::before {
        top: -180px;
        right: -120px;
        width: 420px;
        height: 420px;
        background: radial-gradient(circle at center, rgba(212, 167, 118, 0.16), transparent 68%);
      }

      body::after {
        left: -160px;
        bottom: -200px;
        width: 520px;
        height: 520px;
        background: radial-gradient(circle at center, rgba(110, 126, 167, 0.14), transparent 70%);
      }

      * {
        scrollbar-width: thin;
        scrollbar-color: var(--scroll-thumb) var(--scroll-track);
      }

      *::-webkit-scrollbar {
        width: 10px;
        height: 10px;
      }

      *::-webkit-scrollbar-track {
        background: var(--scroll-track);
      }

      *::-webkit-scrollbar-thumb {
        background: var(--scroll-thumb);
        border-radius: 999px;
        border: 2px solid transparent;
        background-clip: padding-box;
      }

      *::-webkit-scrollbar-thumb:hover {
        background: var(--scroll-thumb-hover);
        border: 2px solid transparent;
        background-clip: padding-box;
      }

      *::-webkit-scrollbar-corner {
        background: transparent;
      }

      button,
      input,
      textarea {
        font: inherit;
      }

      .app {
        display: grid;
        grid-template-columns: 268px minmax(0, 1fr);
        height: 100vh;
        overflow: hidden;
      }

      .app.sidebar-collapsed {
        grid-template-columns: 86px minmax(0, 1fr);
      }

      .sidebar {
        background: linear-gradient(180deg, rgba(29, 27, 25, 0.95), rgba(26, 24, 22, 0.92));
        border-right: 1px solid var(--line);
        padding: 16px 12px 12px;
        display: grid;
        grid-template-rows: auto auto auto 1fr auto;
        gap: 18px;
        min-height: 0;
        backdrop-filter: blur(14px);
      }

      .brand-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 6px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .brand-badge {
        width: 30px;
        height: 30px;
        border-radius: 10px;
        display: grid;
        place-items: center;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.09), rgba(255, 255, 255, 0.03));
        border: 1px solid var(--line);
        font-size: 14px;
        font-weight: 700;
        overflow: hidden;
        box-shadow: var(--shadow-soft);
      }

      .brand-badge img,
      .message-badge img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center;
        transform: scaleX(-1);
        display: block;
      }

      .brand-name {
        font-family: "Literata", serif;
        font-size: 18px;
        letter-spacing: 0.015em;
      }

      .brand-icon {
        width: 28px;
        height: 28px;
        border-radius: 7px;
        border: 1px solid var(--line);
        color: var(--muted);
        display: grid;
        place-items: center;
        font-size: 11px;
        background: var(--surface-glass);
        cursor: pointer;
        transition: border-color 120ms ease, color 120ms ease, background-color 120ms ease;
      }

      .brand-icon:hover {
        border-color: rgba(212, 167, 118, 0.34);
        color: var(--text);
        background: rgba(255, 255, 255, 0.08);
      }

      .nav-list,
      .workspace-list,
      .recent-list {
        display: grid;
        gap: 4px;
      }

      .nav-item,
      .workspace-item,
      .recent-item {
        width: 100%;
        border: 0;
        background: transparent;
        color: var(--muted);
        border-radius: 12px;
        text-align: left;
        padding: 10px 11px;
        display: flex;
        align-items: center;
        gap: 10px;
        cursor: pointer;
        transition: background-color 140ms ease, color 140ms ease;
      }

      .nav-item:hover,
      .nav-item.active,
      .workspace-item:hover,
      .workspace-item.active,
      .recent-item:hover,
      .recent-item.active {
        background: var(--surface-raise);
        color: var(--text);
      }

      .nav-icon,
      .workspace-icon {
        width: 16px;
        height: 16px;
        color: inherit;
        text-align: center;
        opacity: 0.9;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .nav-icon svg,
      .workspace-icon svg,
      .brand-icon svg,
      .topbar-icon svg {
        width: 16px;
        height: 16px;
        stroke: currentColor;
        fill: none;
        stroke-width: 1.8;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .sidebar-section-title {
        color: var(--muted-soft);
        font-size: 12px;
        padding: 0 10px;
        text-transform: none;
      }

      .search-wrap {
        padding: 0 10px;
      }

      .search-input {
        width: 100%;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.03);
        color: var(--text);
        border-radius: 12px;
        padding: 10px 12px;
        outline: none;
        transition: border-color 120ms ease, background-color 120ms ease;
      }

      .search-input:focus {
        border-color: rgba(212, 167, 118, 0.46);
        background: rgba(255, 255, 255, 0.05);
      }

      .search-input::placeholder {
        color: var(--muted-soft);
      }

      .recent-list {
        align-content: start;
        overflow-y: auto;
        min-height: 0;
      }

      .sidebar-panel {
        display: grid;
        gap: 8px;
        padding: 0 10px;
      }

      .panel-card {
        border: 1px solid var(--line);
        background: var(--surface-glass);
        border-radius: 14px;
        padding: 13px;
        display: grid;
        gap: 7px;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
      }

      .panel-card-title {
        font-size: 13px;
        font-weight: 600;
        color: var(--text);
      }

      .panel-card-copy {
        font-size: 12px;
        color: var(--muted);
        line-height: 1.45;
      }

      .panel-chip-row {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .panel-chip {
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 5px 10px;
        font-size: 11px;
        color: var(--muted);
        background: rgba(255, 255, 255, 0.02);
      }

      .genealogy-tree {
        display: grid;
        gap: 8px;
      }

      .genealogy-node {
        border: 1px solid var(--line);
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.03);
        padding: 8px 10px;
        display: grid;
        gap: 4px;
      }

      .genealogy-node.root {
        border-color: rgba(209, 163, 112, 0.28);
        background: rgba(209, 163, 112, 0.1);
      }

      .genealogy-name {
        color: var(--text);
        font-size: 12px;
        font-weight: 600;
      }

      .genealogy-meta {
        color: var(--muted);
        font-size: 11px;
      }

      .genealogy-children {
        margin-left: 14px;
        padding-left: 10px;
        border-left: 1px dashed var(--line);
        display: grid;
        gap: 7px;
      }

      .tool-list {
        display: grid;
        gap: 8px;
      }

      .file-browser {
        display: grid;
        gap: 10px;
      }

      .file-browser-header {
        display: grid;
        gap: 8px;
      }

      .file-browser-breadcrumbs {
        display: flex;
        align-items: center;
        gap: 6px;
        flex-wrap: wrap;
      }

      .file-browser-crumb {
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.03);
        color: var(--muted);
        border-radius: 999px;
        padding: 4px 8px;
        font-size: 11px;
        cursor: pointer;
        transition: background-color 120ms ease, color 120ms ease;
      }

      .file-browser-crumb:hover {
        color: var(--text);
        background: rgba(255, 255, 255, 0.08);
      }

      .file-browser-crumb.current {
        color: #f7dfc5;
        border-color: rgba(209, 163, 112, 0.28);
        background: rgba(209, 163, 112, 0.12);
      }

      .file-browser-actions {
        display: flex;
        align-items: center;
        gap: 6px;
        flex-wrap: wrap;
      }

      .file-browser-list {
        display: grid;
        gap: 8px;
      }

      .file-browser-create {
        display: grid;
        gap: 8px;
      }

      .file-browser-create-row {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .file-browser-create-row input {
        flex: 1 1 auto;
        min-width: 0;
        border: 1px solid var(--line);
        border-radius: 11px;
        background: rgba(255, 255, 255, 0.025);
        color: var(--text);
        padding: 7px 10px;
        font-size: 12px;
        transition: border-color 120ms ease, background-color 120ms ease;
      }

      .file-browser-create-row input:focus {
        outline: none;
        border-color: rgba(212, 167, 118, 0.44);
        background: rgba(255, 255, 255, 0.05);
      }

      .file-preview {
        border: 1px solid var(--line);
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.022);
        padding: 13px;
        display: grid;
        gap: 10px;
      }

      .file-preview-header {
        display: grid;
        gap: 4px;
      }

      .file-preview-title {
        color: var(--text);
        font-size: 13px;
      }

      .file-preview-path {
        font-family: "JetBrains Mono", monospace;
        color: #f1ddd0;
        font-size: 11px;
        overflow-wrap: anywhere;
      }

      .file-preview-actions {
        display: flex;
        align-items: center;
        gap: 6px;
        flex-wrap: wrap;
      }

      .file-preview-meta {
        color: var(--muted-soft);
        font-size: 11px;
      }

      .file-preview-text,
      .file-preview-editor {
        width: 100%;
        min-height: 220px;
        max-height: 360px;
        border: 1px solid var(--line-soft);
        border-radius: 12px;
        background: rgba(0, 0, 0, 0.16);
        color: var(--text);
        padding: 10px 12px;
        overflow: auto;
        line-height: 1.5;
        font-size: 12px;
        font-family: "JetBrains Mono", monospace;
        white-space: pre;
      }

      .file-preview-editor {
        resize: vertical;
        outline: none;
      }

      .file-preview-image {
        width: 100%;
        max-height: 320px;
        border-radius: 10px;
        border: 1px solid var(--line-soft);
        object-fit: contain;
        background: rgba(0, 0, 0, 0.14);
      }

      .permission-manager {
        display: grid;
        gap: 8px;
      }

      .permission-pill-row {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .permission-pill {
        border: 1px solid var(--line);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.03);
        color: var(--muted);
        padding: 5px 10px;
        font-size: 11px;
        cursor: pointer;
        transition: border-color 120ms ease, background-color 120ms ease, color 120ms ease;
      }

      .permission-pill.active {
        border-color: rgba(209, 163, 112, 0.28);
        background: rgba(209, 163, 112, 0.12);
        color: #f7dfc5;
      }

      .workflow-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .workflow-step-actions {
        display: flex;
        align-items: center;
        gap: 6px;
        flex-wrap: wrap;
      }

      .file-browser-item {
        border: 1px solid var(--line);
        border-radius: 13px;
        background: rgba(255, 255, 255, 0.024);
        padding: 10px 12px;
        display: grid;
        gap: 8px;
        transition: border-color 140ms ease, background-color 140ms ease;
      }

      .file-browser-item:hover {
        border-color: rgba(212, 167, 118, 0.28);
        background: rgba(255, 255, 255, 0.045);
      }

      .file-browser-item-main {
        display: flex;
        align-items: baseline;
        gap: 8px;
        min-width: 0;
      }

      .file-browser-item-name {
        color: var(--text);
        overflow-wrap: anywhere;
      }

      .file-browser-item-actions {
        display: flex;
        align-items: center;
        gap: 6px;
        flex-wrap: wrap;
      }

      .workflow-list {
        display: grid;
        gap: 10px;
      }

      .workflow-header {
        display: grid;
        gap: 6px;
      }

      .workflow-title {
        font-size: 15px;
        color: var(--text);
        line-height: 1.4;
      }

      .workflow-summary {
        font-size: 12px;
        color: var(--muted);
        line-height: 1.5;
      }

      .workflow-meta {
        font-size: 11px;
        color: var(--muted-soft);
      }

      .workflow-steps {
        display: grid;
        gap: 8px;
      }

      .workflow-step {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        border: 1px solid var(--line);
        border-radius: 13px;
        background: rgba(255, 255, 255, 0.024);
        padding: 10px 12px;
      }

      .workflow-step-dot {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        margin-top: 4px;
        flex: 0 0 auto;
        border: 1px solid var(--line);
        background: transparent;
      }

      .workflow-step.pending .workflow-step-dot {
        background: rgba(255, 255, 255, 0.08);
      }

      .workflow-step.in_progress .workflow-step-dot {
        background: var(--accent);
        border-color: transparent;
      }

      .workflow-step.completed .workflow-step-dot {
        background: #95c085;
        border-color: transparent;
      }

      .workflow-step-copy {
        display: grid;
        gap: 4px;
      }

      .workflow-step-label {
        font-size: 13px;
        color: var(--text);
        line-height: 1.45;
      }

      .workflow-step-state {
        font-size: 11px;
        color: var(--muted-soft);
        text-transform: lowercase;
      }

      .sidebar-empty {
        border: 1px dashed var(--line);
        border-radius: 14px;
        padding: 14px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.55;
        background: rgba(255, 255, 255, 0.02);
      }

      .tool-item {
        border: 1px solid var(--line);
        border-radius: 13px;
        background: rgba(255, 255, 255, 0.024);
        padding: 10px 12px;
        display: grid;
        gap: 6px;
      }

      .tool-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }

      .tool-name {
        color: var(--text);
        font-size: 13px;
      }

      .tool-state {
        border-radius: 999px;
        padding: 3px 8px;
        font-size: 11px;
        border: 1px solid var(--line);
      }

      .tool-state.enabled {
        color: #d8f1cf;
        background: rgba(91, 140, 82, 0.2);
      }

      .tool-state.disabled {
        color: #f0c5c5;
        background: rgba(144, 71, 71, 0.18);
      }

      .tool-meta {
        color: var(--muted);
        font-size: 12px;
        line-height: 1.45;
      }

      .recent-item {
        justify-content: space-between;
        position: relative;
        min-width: 0;
        gap: 8px;
      }

      .recent-label {
        flex: 1 1 auto;
        min-width: 0;
        overflow: hidden;
        white-space: nowrap;
        text-overflow: ellipsis;
      }

      .recent-more {
        opacity: 0;
        transition: opacity 120ms ease;
        color: var(--muted-soft);
        background: transparent;
        border: 0;
        cursor: pointer;
        width: 24px;
        height: 24px;
        border-radius: 8px;
      }

      .recent-item:hover .recent-more,
      .recent-item.active .recent-more {
        opacity: 1;
      }

      .recent-more:hover {
        background: rgba(255, 255, 255, 0.06);
      }

      .recent-empty {
        padding: 10px;
        color: var(--muted-soft);
        font-size: 12px;
      }

      .menu {
        position: absolute;
        top: calc(100% + 6px);
        right: 0;
        width: 156px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: #2b2926;
        box-shadow: var(--shadow);
        padding: 6px;
        display: grid;
        gap: 2px;
        z-index: 12;
      }

      .menu[hidden] {
        display: none !important;
      }

      .menu-item {
        width: 100%;
        border: 0;
        background: transparent;
        color: var(--text);
        text-align: left;
        border-radius: 8px;
        padding: 8px 10px;
        cursor: pointer;
      }

      .menu-item:hover {
        background: rgba(255, 255, 255, 0.06);
      }

      .menu-item.danger {
        color: #f2c0c0;
      }

      .sidebar-footer {
        border-top: 1px solid var(--line-soft);
        padding: 10px 6px 0;
        display: flex;
        align-items: center;
        justify-content: flex-start;
        gap: 8px;
      }

      .profile {
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
      }

      .profile-avatar {
        width: 30px;
        height: 30px;
        border-radius: 999px;
        background: #d8c8ae;
        color: #2d251c;
        display: grid;
        place-items: center;
        font-weight: 700;
      }

      .profile-meta {
        min-width: 0;
      }

      .profile-name {
        font-size: 13px;
        color: var(--text);
        white-space: nowrap;
      }

      .profile-plan {
        font-size: 11px;
        color: var(--muted-soft);
      }

      .app.sidebar-collapsed .brand-name,
      .app.sidebar-collapsed .nav-item span:last-child,
      .app.sidebar-collapsed .workspace-item span:last-child,
      .app.sidebar-collapsed .recent-list-wrap,
      .app.sidebar-collapsed .profile-meta {
        display: none;
      }

      .app.sidebar-collapsed .brand-row,
      .app.sidebar-collapsed .sidebar-footer {
        justify-content: center;
      }

      .app.sidebar-collapsed .brand,
      .app.sidebar-collapsed .profile {
        gap: 0;
      }

      .app.sidebar-collapsed .brand-icon svg {
        transform: scaleX(-1);
      }

      .app.sidebar-collapsed .nav-item,
      .app.sidebar-collapsed .workspace-item {
        justify-content: center;
        padding-left: 8px;
        padding-right: 8px;
      }

      .overlay {
        position: fixed;
        inset: 0;
        background: rgba(7, 6, 5, 0.45);
        display: grid;
        place-items: center;
        padding: 20px;
        z-index: 20;
      }

      .overlay[hidden] {
        display: none;
      }

      .modal {
        width: min(100%, 460px);
        border-radius: 20px;
        border: 1px solid var(--line);
        background: #2a2825;
        box-shadow: var(--shadow);
        padding: 18px;
        display: grid;
        gap: 14px;
      }

      .modal-title {
        font-family: "Literata", serif;
        font-size: 24px;
      }

      .field {
        display: grid;
        gap: 6px;
      }

      .field label {
        font-size: 12px;
        color: var(--muted);
      }

      .field input,
      .field select {
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.03);
        color: var(--text);
        border-radius: 12px;
        padding: 10px 12px;
        outline: none;
        transition: border-color 120ms ease, background-color 120ms ease;
      }

      .field input:focus,
      .field select:focus {
        border-color: rgba(212, 167, 118, 0.44);
        background: rgba(255, 255, 255, 0.05);
      }

      .modal-actions {
        display: flex;
        justify-content: flex-end;
        gap: 10px;
      }

      .ghost-button {
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.02);
        color: var(--text);
        border-radius: 10px;
        padding: 8px 12px;
        cursor: pointer;
      }

      .toast {
        position: fixed;
        right: 18px;
        bottom: 18px;
        z-index: 30;
        border-radius: 12px;
        border: 1px solid var(--line);
        background: #2d2b28;
        color: var(--text);
        padding: 10px 14px;
        box-shadow: var(--shadow);
      }

      .toast[hidden] {
        display: none;
      }

      .main {
        min-width: 0;
        min-height: 0;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        overflow: hidden;
      }

      .topbar {
        height: 58px;
        border-bottom: 1px solid var(--line-soft);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        padding: 0 20px;
        background: linear-gradient(180deg, rgba(35, 33, 31, 0.82), rgba(35, 33, 31, 0.68));
        backdrop-filter: blur(10px);
      }

      .topbar-title {
        flex: 1 1 auto;
        min-width: 0;
        font-size: 15px;
        font-weight: 600;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .topbar-actions {
        flex: 0 0 auto;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .topbar-button {
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.03);
        color: var(--text);
        border-radius: 10px;
        padding: 8px 12px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        transition: border-color 120ms ease, background-color 120ms ease;
      }

      .topbar-button:hover {
        border-color: rgba(212, 167, 118, 0.34);
        background: rgba(255, 255, 255, 0.06);
      }

      .topbar-button.danger {
        border-color: rgba(209, 163, 112, 0.34);
        background: rgba(209, 163, 112, 0.14);
        color: #f7dfc5;
      }

      .topbar-icon {
        width: 24px;
        height: 24px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.03);
        display: grid;
        place-items: center;
        color: var(--muted);
        font-size: 12px;
        cursor: pointer;
        transition: border-color 120ms ease, color 120ms ease, background-color 120ms ease;
        display: none;
      }

      .topbar-icon:hover {
        border-color: rgba(212, 167, 118, 0.34);
        color: #f0ddc9;
        background: rgba(255, 255, 255, 0.06);
      }

      .content {
        min-height: 0;
        display: grid;
        overflow: hidden;
      }

      .view {
        min-height: 0;
        width: 100%;
        height: 100%;
      }

      .view[hidden] {
        display: none !important;
      }

      .welcome-view {
        height: 100%;
        display: grid;
        place-items: center;
        padding: 32px;
      }

      .welcome-shell {
        width: min(100%, 720px);
        display: grid;
        gap: 24px;
        justify-items: center;
      }

      .welcome-badges {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        justify-content: center;
      }

      .welcome-badge {
        border: 1px solid var(--line);
        background: rgba(0, 0, 0, 0.15);
        border-radius: 999px;
        padding: 6px 12px;
        font-size: 12px;
        color: var(--muted);
      }

      .welcome-badge.warning {
        border-color: rgba(209, 163, 112, 0.34);
        background: rgba(209, 163, 112, 0.14);
        color: #f7dfc5;
      }

      .welcome-title {
        font-family: "Literata", serif;
        font-size: clamp(38px, 5vw, 56px);
        line-height: 1.04;
        text-align: center;
        letter-spacing: -0.02em;
        text-wrap: balance;
        text-shadow: 0 10px 26px rgba(0, 0, 0, 0.25);
      }

      .welcome-title .spark {
        color: var(--accent);
        margin-right: 8px;
      }

      .composer-card {
        width: 100%;
        background: linear-gradient(180deg, rgba(52, 49, 45, 0.96), rgba(43, 40, 36, 0.98));
        border: 1px solid var(--line);
        border-radius: 22px;
        box-shadow: var(--shadow);
        padding: 18px 18px 16px;
        backdrop-filter: blur(12px);
      }

      .composer-card textarea {
        width: 100%;
        min-height: 78px;
        resize: none;
        border: 0;
        background: transparent;
        color: var(--text);
        outline: none;
        font-size: 18px;
        line-height: 1.4;
        letter-spacing: 0.01em;
      }

      .composer-card textarea::placeholder {
        color: var(--muted);
      }

      .composer-toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-top: 10px;
      }

      .attachment-list {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 10px;
      }

      .attachment-chip {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 6px 10px;
        font-size: 12px;
        color: var(--muted);
        background: rgba(255, 255, 255, 0.04);
      }

      .attachment-remove {
        width: 18px;
        height: 18px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: transparent;
        color: var(--muted);
        display: grid;
        place-items: center;
        cursor: pointer;
        padding: 0;
      }

      .attachment-feedback {
        margin-top: 10px;
        font-size: 12px;
        color: var(--muted-soft);
      }

      .attachment-feedback.error {
        color: #f0c5c5;
      }

      .toolbar-left,
      .toolbar-right {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .toolbar-plus,
      .toolbar-send {
        width: 32px;
        height: 32px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: transparent;
        color: var(--muted);
        display: grid;
        place-items: center;
        cursor: pointer;
        transition: transform 120ms ease, border-color 120ms ease, background-color 120ms ease, color 120ms ease;
      }

      .toolbar-plus:hover,
      .toolbar-send:hover {
        transform: translateY(-1px);
      }

      .toolbar-send {
        background: var(--text);
        color: #26211c;
        border-color: transparent;
      }

      .toolbar-send.cancel {
        background: #4a332f;
        color: #f6d9d2;
      }

      .model-select {
        color: var(--muted);
        font-size: 14px;
      }

      .suggestion-row {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: center;
      }

      .suggestion-chip {
        border: 1px solid var(--line);
        background: var(--surface-glass);
        color: var(--muted);
        border-radius: 12px;
        padding: 9px 14px;
        font-size: 14px;
        cursor: pointer;
        transition: border-color 120ms ease, background-color 120ms ease, color 120ms ease;
      }

      .suggestion-chip:hover {
        border-color: rgba(212, 167, 118, 0.35);
        background: rgba(255, 255, 255, 0.07);
        color: var(--text);
      }

      .chat-view {
        height: 100%;
        min-height: 0;
        display: grid;
        grid-template-rows: minmax(0, 1fr) auto;
        overflow: hidden;
      }

      .family-view {
        height: 100%;
        min-height: 0;
        overflow-y: auto;
        padding: 26px 24px 40px;
      }

      .panel-view {
        height: 100%;
        min-height: 0;
        overflow-y: auto;
        padding: 26px 28px 40px;
      }
      .panel-view-inner {
        width: min(100%, 720px);
        margin: 0 auto;
        display: grid;
        gap: 14px;
      }
      .panel-view-title {
        font-family: "Literata", serif;
        font-size: clamp(22px, 3vw, 30px);
        line-height: 1.1;
        letter-spacing: -0.01em;
        margin-bottom: 4px;
      }

      /* ── Family Tree ──────────────────────────────────── */

      .ft-root {
        --ft-line: rgba(209, 163, 112, 0.5);
        --ft-v: 28px;
        width: min(100%, 1040px);
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        gap: 32px;
      }

      .ft-head { display: grid; gap: 6px; }

      .ft-title {
        font-family: "Literata", serif;
        font-size: clamp(22px, 3vw, 32px);
        line-height: 1.08;
        letter-spacing: -0.01em;
      }

      .ft-subtitle {
        font-size: 13px;
        color: var(--muted);
      }

      /* ── Tree diagram ─────────────────────────────────── */
      .ft-tree {
        display: flex;
        flex-direction: column;
        align-items: center;
        position: relative;
        overflow-x: auto;
        padding: 4px 16px 8px;
      }

      /* ── Level rows ──────────────────────────────────── */
      .ft-ul {
        list-style: none;
        margin: 0;
        padding: var(--ft-v) 0 0;
        display: flex;
        position: relative;
      }

      /* Vertical stem from parent into this row */
      .ft-ul::before {
        content: "";
        position: absolute;
        top: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 2px;
        height: var(--ft-v);
        background: var(--ft-line);
        border-radius: 2px;
      }

      /* Root row: stem handled by .ft-v-stem */
      .ft-ul.ft-ul--root::before { display: none; }

      .ft-ul.ft-ul--top::before { display: none; }

      .ft-li.ft-li--rafaela {
        z-index: 2;
      }

      .ft-li.ft-li--rafaela > .ft-ul.ft-ul--branch {
        position: absolute;
        top: calc(100% + 8px);
        left: 50%;
        transform: translateX(-14%);
        min-width: max-content;
      }

      .ft-li.ft-li--rafaela > .ft-ul.ft-ul--branch::before {
        left: 34%;
      }

      /* ── Individual items ────────────────────────────── */
      .ft-li {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: var(--ft-v) 8px 0;
        position: relative;
      }

      /* Horizontal bar segments */
      .ft-li::before,
      .ft-li::after {
        content: "";
        position: absolute;
        top: 0;
        height: 2px;
        background: var(--ft-line);
        width: 50%;
      }
      .ft-li::before { right: 50%; }
      .ft-li::after  { left:  50%; }

      .ft-li:only-child::before,
      .ft-li:only-child::after { display: none; }
      .ft-li:first-child::before { opacity: 0; }
      .ft-li:last-child::after   { opacity: 0; }

      /* Vertical from horizontal bar down to node or couple */
      .ft-li > .ft-node,
      .ft-li > .ft-couple { position: relative; }

      .ft-li > .ft-node::before,
      .ft-li > .ft-couple::before {
        content: "";
        position: absolute;
        top: calc(-1 * var(--ft-v));
        left: 50%;
        transform: translateX(-50%);
        width: 2px;
        height: var(--ft-v);
        background: var(--ft-line);
        border-radius: 2px;
      }

      /* ── Explicit vertical connector (root → children) ── */
      .ft-v-stem {
        width: 2px;
        height: var(--ft-v);
        background: var(--ft-line);
        border-radius: 2px;
      }

      .ft-v-stem.ft-v-stem--main {
        height: calc(var(--ft-v) * 6);
        margin-top: 2px;
      }

      /* ── Node boxes ──────────────────────────────────── */
      .ft-node {
        border: 1px solid rgba(209, 163, 112, 0.35);
        background: rgba(209, 163, 112, 0.08);
        border-radius: 10px;
        padding: 9px 14px;
        text-align: center;
        min-width: 84px;
        display: flex;
        flex-direction: column;
        gap: 2px;
        white-space: nowrap;
      }

      .ft-node.ft-node--ancestor {
        border-color: rgba(209, 163, 112, 0.55);
        background: linear-gradient(180deg,
          rgba(209, 163, 112, 0.22), rgba(209, 163, 112, 0.1));
      }

      .ft-node.ft-node--nucleus {
        border-color: rgba(230, 185, 120, 0.6);
        background: linear-gradient(180deg,
          rgba(230, 185, 120, 0.25), rgba(230, 185, 120, 0.12));
      }

      .ft-node.ft-node--agent {
        border-color: rgba(150, 176, 217, 0.45);
        background: linear-gradient(180deg,
          rgba(150, 176, 217, 0.2), rgba(150, 176, 217, 0.09));
      }

      .ft-node.ft-node--partner {
        border-color: rgba(140, 200, 155, 0.4);
        background: rgba(110, 170, 125, 0.09);
      }

      .ft-node.ft-node--wrap-meta {
        white-space: normal;
      }

      .ft-node-name {
        font-size: 13px;
        font-weight: 600;
        color: var(--text);
      }

      .ft-node--agent .ft-node-name { color: #dce8f8; }
      .ft-node--partner .ft-node-name { color: #c8e8d0; }

      .ft-node-meta {
        font-size: 11px;
        color: var(--muted);
      }

      .ft-node.ft-node--wrap-meta .ft-node-meta {
        max-width: 116px;
        line-height: 1.24;
      }

      /* ── Couple pairing ──────────────────────────────── */
      .ft-couple {
        display: flex;
        align-items: stretch;
      }

      .ft-couple-join {
        display: flex;
        align-items: center;
        padding: 0 8px;
        font-size: 14px;
        color: rgba(209, 163, 112, 0.6);
        border-top: 1px solid rgba(209, 163, 112, 0.25);
        border-bottom: 1px solid rgba(209, 163, 112, 0.25);
        background: rgba(209, 163, 112, 0.04);
      }

      /* ── Friends section ─────────────────────────────── */
      .ft-friends {
        border-top: 1px solid var(--line);
        padding-top: 18px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .ft-friends-label {
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted-soft);
      }

      .ft-friends-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: flex-start;
      }

      .ft-friend {
        border: 1px solid var(--line-soft);
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.03);
        padding: 8px 13px;
        display: flex;
        flex-direction: column;
        gap: 3px;
      }

      .ft-friend-name {
        font-size: 13px;
        font-weight: 600;
        color: var(--text);
      }

      .ft-friend-meta {
        font-size: 11px;
        color: var(--muted);
      }

      .ft-friend-child {
        margin-top: 5px;
        padding-top: 6px;
        border-top: 1px solid var(--line-soft);
        font-size: 11px;
        color: var(--muted);
        display: flex;
        gap: 4px;
        align-items: center;
      }

      .messages {
        min-height: 0;
        overflow-y: auto;
        overflow-x: hidden;
        overscroll-behavior: contain;
        padding: 28px 24px 12px;
        scrollbar-gutter: stable;
      }

      .messages-inner {
        width: min(100%, 760px);
        margin: 0 auto;
        display: grid;
        gap: 28px;
        padding-bottom: 4px;
      }

      .message {
        display: grid;
        gap: 8px;
      }

      .message.user {
        justify-items: end;
      }

      .message.agent {
        justify-items: start;
      }

      .message-role {
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted-soft);
      }

      .message-row {
        width: 100%;
        display: flex;
        align-items: flex-start;
        gap: 10px;
      }

      .message.user .message-row {
        justify-content: flex-end;
      }

      .message-badge {
        width: 20px;
        height: 20px;
        border-radius: 999px;
        border: 1px solid var(--line);
        display: grid;
        place-items: center;
        color: var(--text);
        font-size: 11px;
        background: var(--panel-soft);
        flex: 0 0 auto;
        overflow: hidden;
      }

      .bubble {
        display: inline-block;
        width: fit-content;
        max-width: min(100%, 620px);
        padding: 15px 16px;
        border-radius: 18px;
        border: 1px solid var(--line);
        background: linear-gradient(180deg, rgba(56, 53, 49, 0.96), rgba(49, 46, 42, 0.96));
        line-height: 1.55;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
        box-shadow: var(--shadow-soft);
      }

      .bubble-attachments {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 10px;
      }

      .bubble-attachment {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 5px 9px;
        font-size: 11px;
        color: var(--muted);
        background: rgba(255, 255, 255, 0.04);
      }

      .message.agent .bubble {
        background: rgba(0, 0, 0, 0.08);
        border: 0;
        padding: 2px 0;
        max-width: min(100%, 680px);
        box-shadow: none;
      }

      .listing-card {
        display: grid;
        gap: 14px;
        padding: 4px 0;
      }

      .listing-head {
        display: grid;
        gap: 4px;
      }

      .listing-head-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .listing-title {
        color: var(--text);
        font-size: 14px;
        font-weight: 600;
      }

      .listing-path {
        font-family: "JetBrains Mono", monospace;
        font-size: 12px;
        color: #f1ddd0;
        overflow-wrap: anywhere;
      }

      .listing-breadcrumbs {
        display: flex;
        align-items: center;
        gap: 6px;
        flex-wrap: wrap;
      }

      .listing-crumb {
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.04);
        color: var(--muted);
        border-radius: 999px;
        padding: 4px 8px;
        font-size: 11px;
        cursor: pointer;
      }

      .listing-crumb:hover {
        color: var(--text);
        background: rgba(255, 255, 255, 0.08);
      }

      .listing-crumb.current {
        color: #f7dfc5;
        border-color: rgba(209, 163, 112, 0.28);
        background: rgba(209, 163, 112, 0.12);
      }

      .listing-crumb-sep {
        color: var(--muted-soft);
        font-size: 11px;
      }

      .listing-count {
        font-size: 12px;
        color: var(--muted-soft);
      }

      .listing-items {
        display: grid;
        gap: 8px;
      }

      .listing-item {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 10px;
        min-width: 0;
      }

      .listing-main {
        min-width: 0;
        display: flex;
        align-items: baseline;
        gap: 10px;
      }

      .listing-kind {
        flex: 0 0 auto;
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 2px 8px;
        font-size: 10px;
        color: var(--muted-soft);
      }

      .listing-name {
        color: var(--text);
        overflow-wrap: anywhere;
      }

      .listing-actions {
        flex: 0 0 auto;
        display: flex;
        align-items: center;
        gap: 6px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .listing-action {
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.04);
        color: var(--muted);
        border-radius: 999px;
        padding: 4px 8px;
        font-size: 11px;
        cursor: pointer;
      }

      .listing-action:hover {
        color: var(--text);
        background: rgba(255, 255, 255, 0.08);
      }

      .listing-head-actions {
        display: flex;
        align-items: center;
        gap: 6px;
        flex-wrap: wrap;
      }

      .listing-note {
        font-size: 12px;
        color: var(--muted);
      }

      .approval-bubble {
        display: grid;
        gap: 8px;
        padding: 12px 14px;
        border: 1px solid rgba(209, 163, 112, 0.24);
        background: rgba(209, 163, 112, 0.08);
        border-radius: 14px;
      }

      .approval-bubble-title {
        color: #f7dfc5;
        font-size: 13px;
        font-weight: 600;
      }

      .approval-bubble-copy {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.55;
      }

      .streaming-caret {
        display: inline-block;
        width: 9px;
        margin-left: 3px;
        opacity: 0.9;
        animation: blink 1s steps(1) infinite;
      }

      .trace {
        width: min(100%, 620px);
        margin-top: 6px;
        padding: 10px 12px;
        border-radius: 14px;
        border: 1px dashed var(--line);
        background: rgba(0, 0, 0, 0.12);
        display: grid;
        gap: 8px;
        color: var(--muted);
        font-size: 13px;
      }

      .trace-title {
        color: var(--text);
        font-size: 12px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .trace-count {
        color: var(--muted-soft);
        font-size: 11px;
      }

      .trace-shell {
        border: 1px solid var(--line-soft);
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.02);
        overflow: hidden;
      }

      .trace-shell-summary {
        list-style: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 10px 12px;
      }

      .trace-shell-summary::-webkit-details-marker {
        display: none;
      }

      .trace-shell-main {
        display: flex;
        align-items: center;
        gap: 8px;
        min-width: 0;
      }

      .trace-shell-icon {
        width: 16px;
        text-align: center;
        color: var(--muted-soft);
      }

      .trace-shell-copy {
        display: grid;
        gap: 2px;
      }

      .trace-shell-label {
        color: var(--text);
        font-size: 12px;
      }

      .trace-shell-subtitle {
        color: var(--muted-soft);
        font-size: 11px;
      }

      .trace-shell-body {
        border-top: 1px solid var(--line-soft);
        padding: 8px 0 0;
        display: grid;
        gap: 8px;
      }

      .trace-entry code {
        font-family: "JetBrains Mono", monospace;
        font-size: 12px;
        color: #f1ddd0;
      }

      .trace-card {
        border: 1px solid var(--line-soft);
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.03);
        overflow: hidden;
      }

      .trace-summary {
        list-style: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 10px 12px;
      }

      .trace-summary::-webkit-details-marker {
        display: none;
      }

      .trace-summary-main {
        display: flex;
        align-items: center;
        gap: 8px;
        min-width: 0;
      }

      .trace-summary-icon {
        width: 16px;
        text-align: center;
        color: var(--muted-soft);
      }

      .trace-summary-name {
        color: var(--text);
        font-size: 12px;
      }

      .trace-summary-state {
        border-radius: 999px;
        border: 1px solid var(--line);
        padding: 2px 7px;
        font-size: 10px;
        color: var(--muted);
      }

      .trace-summary-state.pending {
        color: #e9d3a8;
      }

      .trace-summary-state.complete {
        color: #cce7c4;
      }

      .trace-summary-state.error {
        color: #efc1c1;
      }

      .trace-body {
        border-top: 1px solid var(--line-soft);
        padding: 10px 12px 12px;
        display: grid;
        gap: 10px;
      }

      .trace-block {
        display: grid;
        gap: 4px;
      }

      .trace-label {
        font-size: 11px;
        color: var(--muted-soft);
      }

      .trace-pre {
        margin: 0;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
        font-family: "JetBrains Mono", monospace;
        font-size: 12px;
        color: #f1ddd0;
      }

      .permission-request {
        display: grid;
        gap: 8px;
        border: 1px solid rgba(209, 163, 112, 0.24);
        background: rgba(209, 163, 112, 0.08);
        border-radius: 12px;
        padding: 10px 12px;
      }

      .permission-request-title {
        color: #f7dfc5;
        font-size: 12px;
        font-weight: 600;
      }

      .permission-request-copy {
        color: var(--muted);
        font-size: 12px;
        line-height: 1.5;
      }

      .permission-request-actions {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }

      .permission-request-button {
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.05);
        color: var(--text);
        border-radius: 999px;
        padding: 6px 10px;
        font-size: 11px;
        cursor: pointer;
      }

      .permission-request-button.primary {
        border-color: rgba(209, 163, 112, 0.34);
        background: rgba(209, 163, 112, 0.16);
        color: #f7dfc5;
      }

      .live-activity {
        width: min(100%, 620px);
        margin-top: 2px;
        padding: 10px 12px;
        border-radius: 12px;
        border: 1px solid var(--line-soft);
        background: rgba(255, 255, 255, 0.03);
        display: grid;
        gap: 4px;
      }

      .live-activity-label {
        font-size: 11px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted-soft);
      }

      .live-activity-text {
        color: var(--text);
        font-size: 13px;
      }

      .live-activity-meta {
        color: var(--muted);
        font-size: 12px;
      }

      .trace-rich {
        display: grid;
        gap: 8px;
      }

      .trace-rich-summary {
        display: grid;
        gap: 4px;
      }

      .trace-rich-path {
        font-family: "JetBrains Mono", monospace;
        font-size: 12px;
        color: #f1ddd0;
        overflow-wrap: anywhere;
      }

      .trace-rich-count {
        font-size: 11px;
        color: var(--muted-soft);
      }

      .trace-rich-list {
        margin: 0;
        padding: 0;
        list-style: none;
        display: grid;
        gap: 4px;
      }

      .trace-rich-item {
        display: flex;
        align-items: baseline;
        gap: 8px;
        min-width: 0;
      }

      .trace-rich-kind {
        flex: 0 0 auto;
        font-size: 10px;
        color: var(--muted-soft);
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 2px 6px;
      }

      .trace-rich-name {
        min-width: 0;
        overflow-wrap: anywhere;
        color: var(--text);
      }

      .chat-composer-wrap {
        flex: 0 0 auto;
        padding: 10px 24px 22px;
      }

      .chat-composer-inner {
        width: min(100%, 760px);
        margin: 0 auto;
      }

      .chat-composer {
        background: linear-gradient(180deg, rgba(54, 51, 47, 0.96), rgba(45, 43, 39, 0.98));
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 12px 14px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(10px);
      }

      .chat-composer textarea {
        width: 100%;
        min-height: 56px;
        resize: none;
        background: transparent;
        border: 0;
        outline: none;
        color: var(--text);
        font-size: 16px;
      }

      .chat-composer textarea::placeholder {
        color: var(--muted);
      }

      .chat-toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-top: 8px;
      }

      .chat-toolbar-left,
      .chat-toolbar-right {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .status {
        font-size: 12px;
        color: var(--muted-soft);
      }

      .is-busy textarea {
        opacity: 0.72;
      }

      .is-busy .toolbar-plus {
        opacity: 0.45;
        pointer-events: none;
      }

      @keyframes blink {
        0%,
        49% {
          opacity: 1;
        }
        50%,
        100% {
          opacity: 0;
        }
      }

      @media (max-width: 900px) {
        .app {
          grid-template-columns: 1fr;
        }

        .app.sidebar-collapsed {
          grid-template-columns: 1fr;
        }

        .sidebar {
          display: none;
        }

        .topbar-button {
          display: none;
        }

        .topbar-icon {
          display: grid;
        }

        .messages,
        .chat-composer-wrap {
          padding-left: 14px;
          padding-right: 14px;
        }

        .family-view {
          padding: 16px 14px 22px;
        }

        .family-map-branches {
          grid-template-columns: 1fr;
        }

        .family-map-core {
          grid-template-columns: 1fr;
        }

        .family-map-root {
          min-width: 0;
          width: 100%;
        }

        .family-branch-subgroups {
          grid-template-columns: 1fr;
        }

        .welcome-view {
          padding: 22px 14px;
        }

        .welcome-title {
          font-size: clamp(30px, 9.5vw, 40px);
        }

        .composer-card {
          border-radius: 18px;
          padding: 14px;
        }

        .composer-card textarea {
          font-size: 16px;
          min-height: 72px;
        }

        .messages {
          padding-top: 18px;
        }

        .chat-composer {
          border-radius: 15px;
          padding: 10px 12px;
        }
      }

      /* ── Swarm / Plugins / Monitor / Audit panels ── */
      .swarm-team-card {
        border: 1px solid var(--line);
        border-radius: 12px;
        background: var(--surface-glass);
        padding: 11px 13px;
        display: grid;
        gap: 6px;
      }
      .swarm-team-name {
        font-size: 13px;
        font-weight: 600;
        color: var(--text);
      }
      .swarm-team-meta {
        font-size: 11px;
        color: var(--muted);
      }
      .swarm-team-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
        margin-top: 3px;
      }
      .swarm-create-row {
        display: flex;
        gap: 6px;
        align-items: center;
      }
      .swarm-create-row input {
        flex: 1 1 auto;
        min-width: 0;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: rgba(255,255,255,0.03);
        color: var(--text);
        padding: 7px 10px;
        font-size: 12px;
        outline: none;
        transition: border-color 120ms;
      }
      .swarm-create-row input:focus {
        border-color: rgba(212,167,118,0.44);
        background: rgba(255,255,255,0.05);
      }
      .swarm-msg-area {
        display: grid;
        gap: 5px;
        margin-top: 4px;
      }
      .swarm-msg-area textarea {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: rgba(255,255,255,0.03);
        color: var(--text);
        padding: 7px 10px;
        font-size: 12px;
        resize: vertical;
        min-height: 56px;
        outline: none;
        box-sizing: border-box;
        transition: border-color 120ms;
      }
      .swarm-msg-area textarea:focus {
        border-color: rgba(212,167,118,0.44);
        background: rgba(255,255,255,0.05);
      }
      .plugin-card {
        border: 1px solid var(--line);
        border-radius: 12px;
        background: var(--surface-glass);
        padding: 11px 13px;
        display: grid;
        gap: 5px;
      }
      .plugin-card-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }
      .plugin-card-name {
        font-size: 13px;
        font-weight: 600;
        color: var(--text);
      }
      .plugin-card-meta {
        font-size: 11px;
        color: var(--muted);
      }
      .plugin-toggle {
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 4px 10px;
        font-size: 11px;
        background: rgba(255,255,255,0.03);
        color: var(--muted);
        cursor: pointer;
        transition: background 120ms, color 120ms, border-color 120ms;
      }
      .plugin-toggle.active {
        background: rgba(212,167,118,0.15);
        color: var(--accent);
        border-color: rgba(212,167,118,0.3);
      }
      .monitor-stat-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }
      .monitor-stat {
        border: 1px solid var(--line);
        border-radius: 10px;
        background: var(--surface-glass);
        padding: 10px 12px;
        display: grid;
        gap: 3px;
      }
      .monitor-stat-label {
        font-size: 11px;
        color: var(--muted);
      }
      .monitor-stat-value {
        font-size: 16px;
        font-weight: 600;
        color: var(--text);
      }
      .monitor-stat-unit {
        font-size: 11px;
        color: var(--muted-soft);
      }
      .audit-entry {
        border: 1px solid var(--line);
        border-radius: 10px;
        background: var(--surface-glass);
        padding: 9px 12px;
        display: grid;
        gap: 3px;
      }
      .audit-entry-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 6px;
      }
      .audit-entry-tool {
        font-size: 12px;
        font-weight: 600;
        color: var(--text);
      }
      .audit-entry-time {
        font-size: 11px;
        color: var(--muted-soft);
      }
      .audit-entry-meta {
        font-size: 11px;
        color: var(--muted);
      }
      .audit-entry.ok .audit-entry-tool { color: #8fc48f; }
      .audit-entry.err .audit-entry-tool { color: #c47b7b; }
      .panel-refresh-row {
        display: flex;
        justify-content: flex-end;
      }
    </style>
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <div class="brand-row">
          <div class="brand">
            <div class="brand-badge">
              <img src="/agent-avatar.png" alt="Chocks" />
            </div>
            <div class="brand-name">Chocks</div>
          </div>
          <button class="brand-icon" id="toggle-sidebar-button" type="button" title="Colapsar sidebar" aria-label="Colapsar sidebar">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <rect x="3.5" y="5" width="17" height="14" rx="2.4"></rect>
              <path d="M9 5v14"></path>
              <path d="M14 9l3 3-3 3"></path>
            </svg>
          </button>
        </div>

        <div class="nav-list">
          <button class="nav-item" id="new-chat-button" type="button">
            <span class="nav-icon">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 5v14"></path>
                <path d="M5 12h14"></path>
              </svg>
            </span>
            <span>Novo bate-papo</span>
          </button>
          <button class="nav-item" id="search-button" type="button">
            <span class="nav-icon">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="11" cy="11" r="5"></circle>
                <path d="M16 16l4 4"></path>
              </svg>
            </span>
            <span>Procurar</span>
          </button>
        </div>

        <div class="workspace-list">
          <button class="workspace-item active" data-workspace="conversations" type="button">
            <span class="workspace-icon">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M7 8h10"></path>
                <path d="M7 12h7"></path>
                <path d="M7 16h5"></path>
                <rect x="4" y="5" width="16" height="14" rx="4"></rect>
              </svg>
            </span>
            <span>Conversas</span>
          </button>
          <button class="workspace-item" data-workspace="code" type="button">
            <span class="workspace-icon">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M8 8H5a3 3 0 1 1 3-3z"></path>
                <path d="M16 8h3a3 3 0 1 0-3-3z"></path>
                <path d="M8 16H5a3 3 0 1 0 3 3z"></path>
                <path d="M16 16h3a3 3 0 1 1-3 3z"></path>
                <path d="M8 5v14"></path>
                <path d="M16 5v14"></path>
                <path d="M5 8h14"></path>
                <path d="M5 16h14"></path>
              </svg>
            </span>
            <span>Ferramentas</span>
          </button>
          <button class="workspace-item" data-workspace="files" type="button">
            <span class="workspace-icon">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M4 7h6l2 2h8v8a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2z"></path>
                <path d="M4 7a2 2 0 0 1 2-2h4l2 2"></path>
              </svg>
            </span>
            <span>Arquivos</span>
          </button>
          <button class="workspace-item" data-workspace="workflow" type="button">
            <span class="workspace-icon">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M5 7h9"></path>
                <path d="M5 12h14"></path>
                <path d="M5 17h8"></path>
                <circle cx="17" cy="7" r="2"></circle>
                <circle cx="16" cy="17" r="2"></circle>
              </svg>
            </span>
            <span>Workflow</span>
          </button>
          <button class="workspace-item" data-workspace="family" type="button">
            <span class="workspace-icon">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="12" cy="7" r="2.2"></circle>
                <circle cx="7" cy="16" r="2"></circle>
                <circle cx="17" cy="16" r="2"></circle>
                <path d="M12 9.5v2.8"></path>
                <path d="M12 12.3h-5"></path>
                <path d="M12 12.3h5"></path>
              </svg>
            </span>
            <span>Familia</span>
          </button>
          <button class="workspace-item" data-workspace="settings" type="button">
            <span class="workspace-icon">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="12" cy="12" r="3"></circle>
                <path d="M12 3v2"></path>
                <path d="M12 19v2"></path>
                <path d="M3 12h2"></path>
                <path d="M19 12h2"></path>
                <path d="M5.6 5.6l1.4 1.4"></path>
                <path d="M17 17l1.4 1.4"></path>
                <path d="M18.4 5.6L17 7"></path>
                <path d="M7 17l-1.4 1.4"></path>
              </svg>
            </span>
            <span>Config</span>
          </button>
          <button class="workspace-item" data-workspace="swarm" type="button">
            <span class="workspace-icon">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="12" cy="5" r="2"></circle>
                <circle cx="5" cy="17" r="2"></circle>
                <circle cx="19" cy="17" r="2"></circle>
                <path d="M12 7v4"></path>
                <path d="M12 11l-7 4"></path>
                <path d="M12 11l7 4"></path>
              </svg>
            </span>
            <span>Swarm</span>
          </button>
          <button class="workspace-item" data-workspace="coordinator" type="button">
            <span class="workspace-icon">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="12" cy="5" r="2"></circle>
                <circle cx="5" cy="18" r="1.8"></circle>
                <circle cx="19" cy="18" r="1.8"></circle>
                <path d="M12 7v6"></path>
                <path d="M12 13l-7 5"></path>
                <path d="M12 13l7 5"></path>
              </svg>
            </span>
            <span>Coordinator</span>
          </button>
          <button class="workspace-item" data-workspace="plugins" type="button">
            <span class="workspace-icon">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 2L3 7v5c0 5.25 3.75 10.15 9 11.35C17.25 22.15 21 17.25 21 12V7z"></path>
                <path d="M9 12l2 2 4-4"></path>
              </svg>
            </span>
            <span>Plugins</span>
          </button>
          <button class="workspace-item" data-workspace="monitor" type="button">
            <span class="workspace-icon">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <rect x="2" y="4" width="20" height="14" rx="2"></rect>

                <path d="M12 18v2"></path>

            <span>Monitor</span>

                <path d="M8 13h8"></path>
                <path d="M8 17h5"></path>

            <span>Audit</span>

        <div class="recent-list-wrap">
          <div class="sidebar-section-title" id="sidebar-section-title">Recentes</div>
          <div class="search-wrap" id="search-wrap" hidden>
            <input class="search-input" id="search-input" type="text" placeholder="Buscar conversa..." />
          </div>
          <div class="recent-list" id="recent-list"></div>
          <div class="sidebar-panel" id="sidebar-panel" hidden></div>
        </div>

        <div class="sidebar-footer">
          <div class="profile">
            <div class="profile-avatar">B</div>
            <div class="profile-meta">
              <div class="profile-name">bsilv</div>
              <div class="profile-plan">Plano local</div>
            </div>
          </div>
        </div>
      </aside>

      <main class="main">
        <div class="topbar">
          <div class="topbar-title" id="topbar-title">Nova conversa</div>
          <div class="topbar-actions">
            <button class="topbar-button" id="full-access-toggle" type="button">Acesso total: off</button>
            <button class="topbar-button" id="share-button" type="button">Compartilhar</button>
            <button class="topbar-button" id="profile-button" type="button" title="Abrir configuracoes">Config</button>
            <button class="topbar-icon" id="profile-icon-button" type="button" title="Abrir configuracoes" aria-label="Abrir configuracoes">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="12" cy="8" r="3.2"></circle>
                <path d="M6.5 18.5c1.6-2.7 3.5-4 5.5-4s3.9 1.3 5.5 4"></path>
              </svg>
            </button>
          </div>
        </div>

        <div class="content">
          <div class="view welcome-view" id="welcome-view">
            <div class="welcome-shell">
              <div class="welcome-badges">
                <div class="welcome-badge">Plano local</div>
                <div class="welcome-badge">Chocks Workspace</div>
                <div class="welcome-badge warning" id="welcome-full-access-badge" hidden>Acesso total ligado</div>
              </div>
              <div class="welcome-title"><span class="spark">*</span>Bem-vindo ao Chocks</div>
              <div class="composer-card">
                <textarea id="welcome-prompt" placeholder="Como posso ajudar voce hoje?"></textarea>
                <input id="welcome-file-input" type="file" hidden />
                <div class="attachment-list" id="welcome-attachments" hidden></div>
                <div class="attachment-feedback" id="welcome-attachment-feedback" hidden></div>
                <div class="composer-toolbar">
                  <div class="toolbar-left">
                    <button class="toolbar-plus" id="welcome-attach" type="button">+</button>
                  </div>
                  <div class="toolbar-right">
                    <div class="model-select">gpt-4o-mini</div>
                    <button class="toolbar-send" id="welcome-send" type="button">^</button>
                  </div>
                </div>
              </div>
              <div class="suggestion-row">
                <button class="suggestion-chip" type="button" data-suggestion="Escreva um plano curto para a tarefa que eu vou descrever.">Escrever</button>
                <button class="suggestion-chip" type="button" data-suggestion="Explique este tema em linguagem simples, com exemplos praticos.">Aprender</button>
                <button class="suggestion-chip" type="button" data-suggestion="Analise meu codigo atual e proponha o proximo passo com patch objetivo.">Codigo</button>
                <button class="suggestion-chip" type="button" data-suggestion="Sugira a melhor acao para avançar no objetivo atual do projeto.">Escolha do Chocks</button>
              </div>
            </div>
          </div>

          <div class="view chat-view" id="chat-view" hidden>
            <div class="messages" id="messages">
              <div class="messages-inner" id="messages-inner"></div>
            </div>
            <div class="chat-composer-wrap">
              <div class="chat-composer-inner">
                <div class="chat-composer">
                  <textarea id="chat-prompt" placeholder="Responder..."></textarea>
                  <input id="chat-file-input" type="file" hidden />
                  <div class="attachment-list" id="chat-attachments" hidden></div>
                  <div class="attachment-feedback" id="chat-attachment-feedback" hidden></div>
                  <div class="chat-toolbar">
                    <div class="chat-toolbar-left">
                      <button class="toolbar-plus" id="chat-attach" type="button">+</button>
                      <div class="status" id="status"></div>
                    </div>
                    <div class="chat-toolbar-right">
                      <div class="model-select">gpt-4o-mini</div>
                      <button class="toolbar-send" id="chat-send" type="button">^</button>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div class="view family-view" id="family-view" hidden>
            <div class="family-map-shell" id="family-map"></div>

      function loadSettings() {
        try {
          const raw = localStorage.getItem(SETTINGS_KEY)
          const parsed = raw ? JSON.parse(raw) : {}
          return {
            displayName: parsed.displayName || "bsilv",
            welcomeTitle: parsed.welcomeTitle || "Bem-vindo ao Chocks",
            planLabel: parsed.planLabel || "Plano local",
            permissionMode: parsed.permissionMode || "ask",
            fullAccess: !!parsed.fullAccess,
          }
        } catch {
          return {
            displayName: "bsilv",
            welcomeTitle: "Bem-vindo ao Chocks",
            planLabel: "Plano local",
            permissionMode: "ask",
            fullAccess: false,
          }
        }
      }

      function getLocalUser() {
        try {
          const raw = localStorage.getItem(USER_KEY)
          const parsed = raw ? JSON.parse(raw) : {}
          const id = typeof parsed.id === "string" && parsed.id.trim()
            ? parsed.id.trim()
            : `user_${Date.now()}_${Math.random().toString(16).slice(2, 10)}`
          const displayName = typeof parsed.displayName === "string" && parsed.displayName.trim()
            ? parsed.displayName.trim()
            : loadSettings().displayName
          const user = { id, displayName }
          localStorage.setItem(USER_KEY, JSON.stringify(user))
          return user
        } catch {
          const user = {
            id: `user_${Date.now()}_${Math.random().toString(16).slice(2, 10)}`,
            displayName: loadSettings().displayName,
          }
          localStorage.setItem(USER_KEY, JSON.stringify(user))
          return user
        }
      }

      function syncLocalUserDisplayName() {
        const user = getLocalUser()
        const settings = loadSettings()
        const nextUser = { ...user, displayName: settings.displayName }
        localStorage.setItem(USER_KEY, JSON.stringify(nextUser))
        return nextUser
      }

      function saveSettings(settings) {
        localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings))
      }

      function loadChatApprovals() {
        try {
          const raw = localStorage.getItem(APPROVALS_KEY)
          const parsed = raw ? JSON.parse(raw) : {}
          return parsed && typeof parsed === "object" ? parsed : {}
        } catch {
          return {}
        }
      }

      function saveChatApprovals(state) {
        localStorage.setItem(APPROVALS_KEY, JSON.stringify(state || {}))
      }

      function getApprovedToolsForChat(chatId = getActiveChatId()) {
        if (!chatId) return []
        const state = loadChatApprovals()
        const approved = state?.[chatId]
        return Array.isArray(approved) ? approved.map((item) => String(item || "").trim()).filter(Boolean) : []
      }

      function approveToolForChat(chatId, tool) {
        if (!chatId || !tool) return
        const state = loadChatApprovals()
        const current = Array.isArray(state?.[chatId]) ? state[chatId] : []
        if (!current.includes(tool)) {
          state[chatId] = [...current, tool]
          saveChatApprovals(state)
        }
      }

      function clearChatApprovals(chatId) {
        if (!chatId) return
        const state = loadChatApprovals()
        if (Object.prototype.hasOwnProperty.call(state, chatId)) {
          delete state[chatId]
          saveChatApprovals(state)
        }
      }

      function getWorkspaceMode() {
        return localStorage.getItem(WORKSPACE_KEY) || "conversations"
      }

      function setWorkspaceMode(mode) {
        localStorage.setItem(WORKSPACE_KEY, mode)
      }

      function loadFileBrowserState() {
        try {
          const raw = localStorage.getItem(FILE_BROWSER_KEY)
          const parsed = raw ? JSON.parse(raw) : null
          if (!parsed || typeof parsed !== "object") return null
          return {
            path: typeof parsed.path === "string" ? parsed.path : "",
            entries: Array.isArray(parsed.entries) ? parsed.entries : [],
          }
        } catch {
          return null
        }
      }

      function saveFileBrowserState(state) {
        fileBrowserState = state
        localStorage.setItem(FILE_BROWSER_KEY, JSON.stringify(state || {}))
      }

      function loadFilePreviewState() {
        try {
          const raw = localStorage.getItem(FILE_PREVIEW_KEY)
          const parsed = raw ? JSON.parse(raw) : null
          if (!parsed || typeof parsed !== "object") return null
          return {
            path: typeof parsed.path === "string" ? parsed.path : "",
            mode: typeof parsed.mode === "string" ? parsed.mode : "empty",
            content: typeof parsed.content === "string" ? parsed.content : "",
            mime: typeof parsed.mime === "string" ? parsed.mime : "",
            updatedAt: typeof parsed.updatedAt === "string" ? parsed.updatedAt : "",
          }
        } catch {
          return null
        }
      }

      function saveFilePreviewState(state) {
        filePreviewState = state
        localStorage.setItem(FILE_PREVIEW_KEY, JSON.stringify(state || {}))
      }

      function clearFilePreviewState() {
        filePreviewState = null
        localStorage.removeItem(FILE_PREVIEW_KEY)
      }

      function loadWorkflowArchive() {
        try {
          const raw = localStorage.getItem(WORKFLOW_ARCHIVE_KEY)
          const parsed = raw ? JSON.parse(raw) : {}
          return parsed && typeof parsed === "object" ? parsed : {}
        } catch {
          return {}
        }
      }

      function saveWorkflowArchive(state) {
        localStorage.setItem(WORKFLOW_ARCHIVE_KEY, JSON.stringify(state || {}))
      }

      function getArchivedWorkflowForChat(chatId = getActiveChatId()) {
        if (!chatId) return null
        const archive = loadWorkflowArchive()
        return archive?.[chatId] || null
      }

      function setArchivedWorkflowForChat(chatId, workflow) {
        if (!chatId || !workflow) return
        const archive = loadWorkflowArchive()
        archive[chatId] = workflow
        saveWorkflowArchive(archive)
      }

      function clearArchivedWorkflowForChat(chatId) {
        if (!chatId) return
        const archive = loadWorkflowArchive()
        if (Object.prototype.hasOwnProperty.call(archive, chatId)) {
          delete archive[chatId]
          saveWorkflowArchive(archive)
        }
      }

      function getPermissionCategories() {
        return {
          leitura: ["file_read", "glob", "grep", "todo_list", "workflow_get", "env_get", "pwd", "ls_safe"],
          escrita: ["file_write", "file_edit", "file_copy", "file_move", "directory_create", "todo_add", "todo_update", "workflow_replace", "workflow_update_step", "workflow_clear"],
          exclusao: ["file_delete"],
          web: ["web_fetch"],
          shell: ["bash_exec"],
        }
      }

      function revokeToolForChat(chatId, tool) {
        if (!chatId || !tool) return
        const state = loadChatApprovals()
        const current = Array.isArray(state?.[chatId]) ? state[chatId] : []
        state[chatId] = current.filter((item) => item !== tool)
        if (state[chatId].length === 0) delete state[chatId]
        saveChatApprovals(state)
      }

      function approveCategoryForChat(chatId, category) {
        const categories = getPermissionCategories()
        const tools = categories?.[category] || []
        tools.forEach((tool) => approveToolForChat(chatId, tool))
      }

      function revokeCategoryForChat(chatId, category) {
        const categories = getPermissionCategories()
        const tools = categories?.[category] || []
        tools.forEach((tool) => revokeToolForChat(chatId, tool))
