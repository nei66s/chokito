              <div class="panel-card">
                <div class="panel-card-title">${escapeHtml(card.title)}</div>
                <div class="panel-card-copy">${escapeHtml(card.copy)}</div>
                ${chips}
              </div>
            `
          })
          .join("") + `
            <div class="panel-card permission-manager">
              <div class="panel-card-title">Permissoes ativas nesta conversa</div>
              <div class="panel-card-copy">
                ${approvedTools.length > 0 ? `${approvedTools.length} permissoes liberadas.` : "Nenhuma permissao persistente ativa."}
              </div>
              <div class="permission-pill-row">
                ${Object.keys(categories)
                  .map((category) => {
                    const tools = categories[category] || []
                    const enabled = tools.some((tool) => approvedTools.includes(tool))
                    return `<button class="permission-pill ${enabled ? "active" : ""}" type="button" data-permission-category="${escapeHtml(category)}">${escapeHtml(category)}</button>`
                  })
                  .join("")}
              </div>
              <div class="permission-pill-row">
                ${approvedTools
                  .map((tool) => `<button class="permission-pill active" type="button" data-permission-revoke="${escapeHtml(tool)}">revogar ${escapeHtml(tool)}</button>`)
                  .join("")}
              </div>
              <div class="file-browser-actions">
                <button class="listing-action" type="button" data-permission-clear-all="1">Revogar tudo</button>
              </div>
            </div>
          `

        sidebarPanelEl.querySelectorAll("[data-permission-category]").forEach((button) => {
          button.addEventListener("click", async () => {
            const category = button.getAttribute("data-permission-category")
            if (!chatId || !category) return
            const hasAny = (categories[category] || []).some((tool) => approvedTools.includes(tool))
            if (hasAny) revokeCategoryForChat(chatId, category)
            else approveCategoryForChat(chatId, category)
            await loadToolStatuses()
            renderSidebarMode()
          })
        })

        sidebarPanelEl.querySelectorAll("[data-permission-revoke]").forEach((button) => {
          button.addEventListener("click", async () => {
            const tool = button.getAttribute("data-permission-revoke")
            if (!chatId || !tool) return
            revokeToolForChat(chatId, tool)
            await loadToolStatuses()
            renderSidebarMode()
          })
        })

        sidebarPanelEl.querySelectorAll("[data-permission-clear-all]").forEach((button) => {
          button.addEventListener("click", async () => {
            if (!chatId) return
            clearChatApprovals(chatId)
            await loadToolStatuses()
            renderSidebarMode()
          })
        })
        syncNavButtons()
      }

      function renderTrace(trace, options = {}) {
        if (!Array.isArray(trace) || trace.length === 0) return ""
        const chatId = options.chatId || ""
        const grouped = []
        const byCallId = new Map()

        trace.forEach((entry) => {
          if (entry.type === "tool_call") {
            const group = {
              callId: entry.call_id,
              name: entry.name,
              arguments: entry.arguments || "",
              output: "",
              status: "pending",
            }
            byCallId.set(entry.call_id, group)
            grouped.push(group)
            return
          }

          const match = byCallId.get(entry.call_id)
          if (!match) return
          match.output = String(entry.output || "")
          match.status = match.output.includes('"ok":false') ? "error" : "complete"
        })

        function renderLsSafePayload(text, kind) {
          const parsed = tryParseJson(text)
          if (!parsed || typeof parsed !== "object") return ""

          if (kind === "arguments") {
            const targetPath = typeof parsed.path === "string" ? parsed.path : ""
            if (!targetPath) return ""
            return `
              <div class="trace-rich">
                <div class="trace-rich-summary">
                  <div class="trace-rich-path">${escapeHtml(targetPath)}</div>
                </div>
              </div>
            `
          }

          if (!parsed.ok || !parsed.output || typeof parsed.output !== "object") return ""
          const targetPath = typeof parsed.output.path === "string" ? parsed.output.path : ""
          const entries = Array.isArray(parsed.output.entries) ? parsed.output.entries : []
          const preview = entries.slice(0, 10)
          const suffix =
            entries.length > preview.length
              ? `<div class="trace-rich-count">Mostrando ${preview.length} de ${entries.length} itens.</div>`
              : ""

          return `
            <div class="trace-rich">
              <div class="trace-rich-summary">
                ${targetPath ? `<div class="trace-rich-path">${escapeHtml(targetPath)}</div>` : ""}
                <div class="trace-rich-count">${entries.length} ${entries.length === 1 ? "item" : "itens"}</div>
              </div>
              ${
                preview.length > 0
                  ? `<ul class="trace-rich-list">${preview
                      .map((entry) => {
                        const kindLabel = entry?.type === "dir" ? "Pasta" : "Arquivo"
                        const name = typeof entry?.name === "string" ? entry.name : ""
                        return `<li class="trace-rich-item"><span class="trace-rich-kind">${kindLabel}</span><span class="trace-rich-name">${escapeHtml(name)}</span></li>`
                      })
                      .join("")}</ul>`
                  : `<div class="trace-rich-count">Sem itens.</div>`
              }
              ${suffix}
            </div>
          `
        }

        function renderTraceBlock(group, kind) {
          const rawText =
            kind === "arguments" ? String(group.arguments || "{}") :
            group.status === "pending" ? "Aguardando retorno..." :
            String(group.output || "")

          if (group.name === "ls_safe") {
            const rich = renderLsSafePayload(rawText, kind)
            if (rich) return rich
          }

          if (kind === "output" && isPermissionBlockedOutput(rawText)) {
            const encodedTool = encodeURIComponent(group.name)
            const encodedArgs = encodeURIComponent(String(group.arguments || "{}"))
            const toolMeta = getToolUiMeta(group.name)
            return `
              <div class="permission-request">
                <div class="permission-request-title">Acao aguardando permissao</div>
                <div class="permission-request-copy">
                  O Chocks pediu autorizacao para <strong>${escapeHtml(toolMeta.noun)}</strong>.
                  ${toolMeta.destructive ? ` Esta e uma acao sensivel e pode alterar ou remover dados.` : ""}
                </div>
                <div class="permission-request-actions">
                  <button class="permission-request-button primary" type="button" onclick="window.handleApprovalAction('${escapeHtml(chatId)}','${encodedTool}','${encodedArgs}', this, false)">Permitir agora</button>
                  <button class="permission-request-button" type="button" onclick="window.handleApprovalAction('${escapeHtml(chatId)}','${encodedTool}','${encodedArgs}', this, true)">Permitir sempre nesta conversa</button>
                  <button class="permission-request-button" type="button" onclick="window.dismissPermissionRequest(this)">Dispensar</button>
                </div>
                <pre class="trace-pre">${formatTraceText(rawText)}</pre>
              </div>
            `
          }

          return `<pre class="trace-pre">${formatTraceText(rawText)}</pre>`
        }

        const pendingCount = grouped.filter((group) => group.status === "pending").length
        const errorCount = grouped.filter((group) => group.status === "error").length
        const subtitle =
          pendingCount > 0 ? `${pendingCount} em andamento` :
          errorCount > 0 ? `${errorCount} com erro` :
          "Expandir detalhes"
        const shellOpen = pendingCount > 0 || errorCount > 0 ? "open" : ""

        const entries = grouped
          .map((group) => {
            const isOpen = group.status === "pending" || group.status === "error" ? "open" : ""
            const label =
              group.status === "pending" ? "rodando" :
              group.status === "error" ? "erro" :
              "concluida"
            const icon =
              group.status === "pending" ? "..." :
              group.status === "error" ? "!" :
              "ok"

            return `
              <details class="trace-card" ${isOpen}>
                <summary class="trace-summary">
                  <div class="trace-summary-main">
                    <span class="trace-summary-icon">${icon}</span>
                    <span class="trace-summary-name">${escapeHtml(getToolUiMeta(group.name).label)}</span>
                  </div>
                  <span class="trace-summary-state ${group.status}">${label}</span>
                </summary>
                <div class="trace-body">
                  <div class="trace-block">
                    <div class="trace-label">Argumentos</div>
                    ${renderTraceBlock(group, "arguments")}
                  </div>
                  <div class="trace-block">
                    <div class="trace-label">Resultado</div>
                    ${renderTraceBlock(group, "output")}
                  </div>
                </div>
              </details>
            `
          })
          .join("")

        const countLabel = `${grouped.length} ${grouped.length === 1 ? "ferramenta" : "ferramentas"}`
        return `
          <div class="trace">
            <details class="trace-shell" ${shellOpen}>
              <summary class="trace-shell-summary">
                <div class="trace-shell-main">
                  <span class="trace-shell-icon">+</span>
                  <div class="trace-shell-copy">
                    <span class="trace-shell-label">Ferramentas usadas</span>
                    <span class="trace-shell-subtitle">${subtitle}</span>
                  </div>
                </div>
                <span class="trace-count">${countLabel}</span>
              </summary>
              <div class="trace-shell-body">${entries}</div>
            </details>
          </div>
        `
      }

      function renderBubbleContent(message, options = {}) {
        function parseDirectoryListing(content) {
          if (typeof content !== "string") return null
          const lines = content.split("\n").map((line) => line.trim()).filter(Boolean)
          if (lines.length < 3) return null

          const title = lines[0]
          const targetPath = lines[1]
          const countLine = lines[2]

          if (!/^[A-Za-z]:[\\/]/.test(targetPath)) return null
          if (!/item(ns)? encontrado(s)?/i.test(countLine)) return null

          const itemLines = []
          let note = ""
          for (let index = 3; index < lines.length; index += 1) {
            const line = lines[index]
            if (/^(Pasta|Arquivo)\s{2,}/.test(line)) {
              itemLines.push(line)
              continue
            }
            note = line
          }

          return {
            title,
            targetPath,
            countLine,
            itemLines,
            note,
          }
        }

        function buildBreadcrumbs(targetPath, chatId, messageIndex) {
          const normalized = String(targetPath || "").trim()
          if (!normalized) return ""

          const windowsMatch = normalized.match(/^([A-Za-z]:)(.*)$/u)
          if (!windowsMatch) {
            return `<div class="listing-path">${escapeHtml(normalized)}</div>`
          }

          const drive = windowsMatch[1]
          const remainder = windowsMatch[2] || ""
          const parts = remainder.split(/[\\/]+/u).filter(Boolean)
          const crumbs = []

          let currentPath = drive
          crumbs.push({ label: drive, path: currentPath })

          for (const part of parts) {
            currentPath = `${currentPath}\\${part}`
            crumbs.push({ label: part, path: currentPath })
          }

          return `
            <div class="listing-breadcrumbs">
              ${crumbs.map((crumb, index) => {
                const isCurrent = index === crumbs.length - 1
                const encodedPath = encodeURIComponent(crumb.path)
                const encodedCurrent = encodeURIComponent(normalized)
                const button = `
                  <button
                    class="listing-crumb${isCurrent ? " current" : ""}"
                    type="button"
                    onclick="window.triggerListingAction('open','${encodedPath}','${escapeHtml(chatId)}',${messageIndex},'${encodedCurrent}')"
                  >${escapeHtml(crumb.label)}</button>
                `
                const sep = index < crumbs.length - 1 ? `<span class="listing-crumb-sep">/</span>` : ""
                return `${button}${sep}`
              }).join("")}
            </div>
          `
        }

        const content = String(message.content || "")
        const blockedRequest = message.role === "agent" ? getBlockedPermissionRequest(message) : null
        if (blockedRequest) {
          const toolMeta = getToolUiMeta(blockedRequest.toolName)
          return `
            <div class="approval-bubble">
              <div class="approval-bubble-title">Aguardando sua aprovacao</div>
              <div class="approval-bubble-copy">
                O Chocks esta pronto para ${escapeHtml(toolMeta.noun)} e continuar a tarefa.
                ${toolMeta.destructive ? " Esta e uma acao sensivel." : ""}
                Use o card de permissao logo abaixo para permitir ou dispensar.
              </div>
            </div>
          `
        }

        const listing = message.role === "agent" ? parseDirectoryListing(content) : null
        if (listing) {
          const chatId = options.chatId || ""
          const messageIndex = Number.isInteger(options.messageIndex) ? options.messageIndex : -1
          const normalizedListingPath = listing.targetPath.replace(/[\\\/]+$/u, "")
          const parentPath = normalizedListingPath.replace(/[\\/][^\\/]+$/u, "")
          const canGoUp = !!parentPath && parentPath !== normalizedListingPath
          const items = listing.itemLines
            .map((line) => {
              const match = line.match(/^(Pasta|Arquivo)\s{2,}(.+)$/)
              const kind = match?.[1] || ""
              const name = match?.[2] || line
              const fullPath = `${normalizedListingPath}\\${name}`
              const encodedPath = encodeURIComponent(fullPath)
              const actions = kind === "Pasta"
                ? `
                  <button class="listing-action" type="button" onclick="window.triggerListingAction('open','${encodedPath}','${escapeHtml(chatId)}',${messageIndex},'${encodeURIComponent(normalizedListingPath)}')">Abrir</button>
                  <button class="listing-action" type="button" onclick="window.triggerListingAction('duplicate','${encodedPath}','${escapeHtml(chatId)}',${messageIndex},'${encodeURIComponent(normalizedListingPath)}')">Duplicar</button>
                  <button class="listing-action" type="button" onclick="window.triggerListingAction('rename','${encodedPath}','${escapeHtml(chatId)}',${messageIndex},'${encodeURIComponent(normalizedListingPath)}')">Renomear</button>
                  <button class="listing-action" type="button" onclick="window.triggerListingAction('move','${encodedPath}','${escapeHtml(chatId)}',${messageIndex},'${encodeURIComponent(normalizedListingPath)}')">Mover</button>
                  <button class="listing-action" type="button" onclick="window.triggerListingAction('copy','${encodedPath}','${escapeHtml(chatId)}',${messageIndex},'${encodeURIComponent(normalizedListingPath)}')">Copiar caminho</button>
                `
                : `
                  <button class="listing-action" type="button" onclick="window.triggerListingAction('read','${encodedPath}','${escapeHtml(chatId)}',${messageIndex},'${encodeURIComponent(normalizedListingPath)}')">Preview</button>
                  <button class="listing-action" type="button" onclick="window.triggerListingAction('edit','${encodedPath}','${escapeHtml(chatId)}',${messageIndex},'${encodeURIComponent(normalizedListingPath)}')">Editar</button>
                  <button class="listing-action" type="button" onclick="window.triggerListingAction('duplicate','${encodedPath}','${escapeHtml(chatId)}',${messageIndex},'${encodeURIComponent(normalizedListingPath)}')">Duplicar</button>
                  <button class="listing-action" type="button" onclick="window.triggerListingAction('rename','${encodedPath}','${escapeHtml(chatId)}',${messageIndex},'${encodeURIComponent(normalizedListingPath)}')">Renomear</button>
                  <button class="listing-action" type="button" onclick="window.triggerListingAction('move','${encodedPath}','${escapeHtml(chatId)}',${messageIndex},'${encodeURIComponent(normalizedListingPath)}')">Mover</button>
                  <button class="listing-action" type="button" onclick="window.triggerListingAction('download','${encodedPath}','${escapeHtml(chatId)}',${messageIndex},'${encodeURIComponent(normalizedListingPath)}')">Baixar</button>
                  <button class="listing-action" type="button" onclick="window.triggerListingAction('delete','${encodedPath}','${escapeHtml(chatId)}',${messageIndex},'${encodeURIComponent(normalizedListingPath)}')">Excluir</button>
                  <button class="listing-action" type="button" onclick="window.triggerListingAction('copy','${encodedPath}','${escapeHtml(chatId)}',${messageIndex},'${encodeURIComponent(normalizedListingPath)}')">Copiar caminho</button>
                `
              return `
                <div class="listing-item">
                  <div class="listing-main">
                    <span class="listing-kind">${escapeHtml(kind)}</span>
                    <span class="listing-name">${escapeHtml(name)}</span>
                  </div>
                  <div class="listing-actions">${actions}</div>
                </div>
              `
            })
            .join("")

          return `
            <div class="listing-card">
              <div class="listing-head">
                <div class="listing-head-row">
                  <div class="listing-title">${escapeHtml(listing.title)}</div>
                  <div class="listing-head-actions">
                    ${canGoUp ? `<button class="listing-action" type="button" onclick="window.triggerListingAction('up','${encodeURIComponent(parentPath)}','${escapeHtml(chatId)}',${messageIndex},'${encodeURIComponent(normalizedListingPath)}')">Subir</button>` : ""}
                    <button class="listing-action" type="button" onclick="window.triggerListingAction('mkdir','${encodeURIComponent(`${normalizedListingPath}\\Nova pasta`)}','${escapeHtml(chatId)}',${messageIndex},'${encodeURIComponent(normalizedListingPath)}')">Nova pasta</button>
                    <button class="listing-action" type="button" onclick="window.triggerListingAction('copy','${encodeURIComponent(listing.targetPath)}','${escapeHtml(chatId)}',${messageIndex},'${encodeURIComponent(normalizedListingPath)}')">Copiar caminho</button>
                  </div>
                </div>
                ${buildBreadcrumbs(listing.targetPath, chatId, messageIndex)}
              </div>
              <div class="listing-count">${escapeHtml(listing.countLine)}</div>
              <div class="listing-items">${items || `<div class="listing-note">Sem itens.</div>`}</div>
              ${listing.note ? `<div class="listing-note">${escapeHtml(listing.note)}</div>` : ""}
            </div>
          `
        }

        const text = escapeHtml(content)
        if (message.role !== "user" || !Array.isArray(message.attachments) || message.attachments.length === 0) {
          return text
        }

        const attachments = message.attachments
          .map((attachment) => `<span class="bubble-attachment">${escapeHtml(attachment.name)}</span>`)
          .join("")

        return `
          <div>${text || "[arquivo anexado]"}</div>
          <div class="bubble-attachments">${attachments}</div>
        `
      }

      function getLatestActivity(chat) {
        const messages = Array.isArray(chat?.messages) ? chat.messages : []
        const lastAgent = [...messages].reverse().find((message) => message?.role === "agent")
        if (!lastAgent || !lastAgent.streaming) return null

        const trace = Array.isArray(lastAgent.trace) ? lastAgent.trace : []
        const toolCalls = new Map()

        trace.forEach((entry) => {
          if (entry?.type === "tool_call") {
            toolCalls.set(entry.call_id, { name: entry.name, done: false })
            return
          }
          if (entry?.type === "tool_output" && toolCalls.has(entry.call_id)) {
            toolCalls.get(entry.call_id).done = true
          }
        })

        const activeTool = [...toolCalls.values()].reverse().find((tool) => !tool.done)
        const runningStep = Array.isArray(activeWorkflow?.steps)
          ? activeWorkflow.steps.find((step) => step.status === "in_progress")
          : null

        if (activeTool) {
          const toolMeta = getToolUiMeta(activeTool.name)
          return {
            label: "Executando",
            text: toolMeta.label,
            meta: runningStep ? `Etapa atual: ${runningStep.text}` : "Chamando ferramenta no sistema",
          }
        }

        if (runningStep) {
          return {
            label: "Planejando",
            text: runningStep.text,
            meta: "Atualizando workflow da conversa",
          }
        }

        return {
          label: "Respondendo",
          text: "Organizando a resposta",
          meta: "Finalizando o texto e o resultado",
        }
      }

      function renderLiveActivity(chat) {
        const activity = getLatestActivity(chat)
        if (!activity) return ""
        return `
          <div class="live-activity">
            <div class="live-activity-label">${escapeHtml(activity.label)}</div>
            <div class="live-activity-text">${escapeHtml(activity.text)}</div>
            <div class="live-activity-meta">${escapeHtml(activity.meta)}</div>
          </div>
        `
      }

      function renderMessages(chat) {
        messagesInnerEl.innerHTML = ""

        chat.messages.forEach((message, messageIndex) => {
          const wrapper = document.createElement("div")
          wrapper.className = `message ${message.role}`
          const role = message.role === "user" ? "VOCE" : "CHOCKS"
          const badge = message.role === "agent" ? `<div class="message-badge"><img src="/agent-avatar.png" alt="Chocks" /></div>` : ""

          const bubbleHtml = renderBubbleContent(message, { chatId: chat.id, messageIndex })
          const streamingCaret = message.role === "agent" && message.streaming ? `<span class="streaming-caret">|</span>` : ""
          const liveActivity = message.role === "agent" && message.streaming ? renderLiveActivity(chat) : ""

          wrapper.innerHTML = `
            <div class="message-role">${role}</div>
            <div class="message-row">
              ${badge}
              <div class="bubble">${bubbleHtml}${streamingCaret}</div>
            </div>
            ${liveActivity}
            ${message.role === "agent" ? renderTrace(message.trace, { chatId: chat.id }) : ""}
          `

          messagesInnerEl.appendChild(wrapper)
        })

        const messagesEl = document.getElementById("messages")
        messagesEl.scrollTop = messagesEl.scrollHeight
      }

      function buildApiMessages(chat) {
        if (!chat || !Array.isArray(chat.messages)) return []

        return chat.messages
          .filter((message) => {
            if (!message || (message.role !== "user" && message.role !== "agent")) return false
            if (message.role === "agent" && message.streaming) return false
            return true
          })
          .map((message) => {
            let content = String(message.content || "")
            if (message.role === "user" && Array.isArray(message.attachments) && message.attachments.length > 0) {
              const attachmentBlock = message.attachments
                .map((attachment) => `Arquivo anexado: ${attachment.name}`)
                .join("\n")
              content = content ? `${content}\n\n${attachmentBlock}` : attachmentBlock
            }

            return {
              role: message.role === "agent" ? "assistant" : "user",
              content,
            }
          })
      }

      function hideAllMainViews() {
        welcomeViewEl.hidden = true
        chatViewEl.hidden = true
        familyViewEl.hidden = true
        swarmViewEl.hidden = true
        coordinatorViewEl.hidden = true
        pluginsViewEl.hidden = true
        monitorViewEl.hidden = true
        auditViewEl.hidden = true
      }

      function renderApp() {
        const mode = getWorkspaceMode()
        if (mode === "family") {
          topbarTitleEl.textContent = "Mapa da familia"
          shareButtonEl.hidden = true
          hideAllMainViews()
          familyViewEl.hidden = false
          renderSidebarMode()
          applySettingsToUi()
          renderFamilyMainView()
          return
        }

        if (mode === "swarm") {
          topbarTitleEl.textContent = "Agent Swarms"
          shareButtonEl.hidden = true
          hideAllMainViews()
          swarmViewEl.hidden = false
          renderSidebarMode()
          applySettingsToUi()
          renderSwarmPanel()
          return
        }

        if (mode === "coordinator") {
          topbarTitleEl.textContent = "Coordinator"
          shareButtonEl.hidden = true
          hideAllMainViews()
          coordinatorViewEl.hidden = false
          renderSidebarMode()
          applySettingsToUi()
          renderCoordinatorPanel()
          return
        }

        if (mode === "plugins") {
          topbarTitleEl.textContent = "Plugins"
          shareButtonEl.hidden = true
          hideAllMainViews()
          pluginsViewEl.hidden = false
          renderSidebarMode()
          applySettingsToUi()
          renderPluginsPanel()
          return
        }

        if (mode === "monitor") {
          topbarTitleEl.textContent = "Monitor"
          shareButtonEl.hidden = true
          hideAllMainViews()
          monitorViewEl.hidden = false
          renderSidebarMode()
          applySettingsToUi()
          renderMonitorPanel()
          return
        }

        if (mode === "audit") {
          topbarTitleEl.textContent = "Audit"
          shareButtonEl.hidden = true
          hideAllMainViews()
          auditViewEl.hidden = false
          renderSidebarMode()
          applySettingsToUi()
          renderAuditPanel()
          return
        }

        const chat = getActiveChat()
        if (!chat) return

        const hasMessages = Array.isArray(chat.messages) && chat.messages.length > 0
        topbarTitleEl.textContent = chat.title || "Nova conversa"
        shareButtonEl.hidden = !hasMessages
        hideAllMainViews()
        if (hasMessages) {
          chatViewEl.hidden = false
        } else {
          welcomeViewEl.hidden = false
        }

        renderSidebarMode()
        applySettingsToUi()

        if (hasMessages) {
          renderMessages(chat)
        }
      }

      async function shareCurrentChat() {
        const chat = getActiveChat()
        if (!chat) return
        const text = (chat.messages || [])
          .map((message) => `${message.role.toUpperCase()}:\n${message.content}`)
          .join("\n\n")
        try {
          await navigator.clipboard.writeText(text)
          showToast("Conversa copiada")
        } catch {
          showToast("Nao foi possivel copiar")
        }
      }

      function openFilePicker(kind) {
        if (kind === "welcome") welcomeFileInputEl.click()
        else chatFileInputEl.click()
      }

      async function handleFileSelection(event, kind) {
        const file = event.target.files?.[0]
        if (!file) return
        const ext = `.${(file.name.split(".").pop() || "").toLowerCase()}`
        if (!ALLOWED_ATTACHMENT_EXTENSIONS.includes(ext)) {
          setAttachmentFeedback(kind, `Tipo nao suportado: ${ext}. Use texto, codigo ou JSON.`, true)
          event.target.value = ""
          return
        }
        if (file.size > MAX_ATTACHMENT_BYTES) {
          setAttachmentFeedback(kind, `Arquivo muito grande. Maximo: ${Math.round(MAX_ATTACHMENT_BYTES / 1024)} KB.`, true)
          event.target.value = ""
          return
        }
        const content = await file.text()
        const nextAttachment = {
          name: file.name,
          content,
        }
        if (kind === "welcome") {
          welcomeAttachments = [...welcomeAttachments, nextAttachment]
          renderAttachmentList(welcomeAttachmentsEl, welcomeAttachments, "welcome")
        } else {
          chatAttachments = [...chatAttachments, nextAttachment]
          renderAttachmentList(chatAttachmentsEl, chatAttachments, "chat")
        }
        setAttachmentFeedback(kind, `${file.name} anexado com sucesso.`)
        event.target.value = ""
      }

      async function loadToolStatuses() {
        try {
          const localUser = getLocalUser()
          const settings = loadSettings()
          const approvedTools = getApprovedToolsForChat()
          const response = await fetch("/tools/status", {
            headers: {
              "x-chocks-user-id": localUser.id,
              "x-chocks-display-name": localUser.displayName,
              "x-chocks-full-access": settings.fullAccess ? "true" : "false",
              "x-chocks-permission-mode": settings.permissionMode,
              "x-chocks-approved-tools": approvedTools.join(","),
            },
          })
          if (!response.ok) throw new Error("tools status unavailable")
          const data = await response.json()
          toolStatuses = Array.isArray(data?.tools) ? data.tools : []
          if (getWorkspaceMode() === "code") {
            renderSidebarMode()
          }
        } catch {
          toolStatuses = []
        }
      }

      async function loadWorkflowStatus(chatId = getActiveChatId()) {
        try {
          const query = chatId ? `?chatId=${encodeURIComponent(chatId)}` : ""
          const localUser = getLocalUser()
          const settings = loadSettings()
          const approvedTools = getApprovedToolsForChat(chatId)
          const response = await fetch(`/workflow/status${query}`, {
            headers: {
              "x-chocks-user-id": localUser.id,
              "x-chocks-display-name": localUser.displayName,
              "x-chocks-full-access": settings.fullAccess ? "true" : "false",
              "x-chocks-permission-mode": settings.permissionMode,
              "x-chocks-approved-tools": approvedTools.join(","),
            },
          })
          if (!response.ok) throw new Error("workflow status unavailable")
          const data = await response.json()
          activeWorkflow = data?.active || null
        } catch {
          activeWorkflow = null
        }

        syncStreamingUi()
        if (getWorkspaceMode() === "workflow") {
          renderSidebarMode()
        }
      }

      async function consumeChatStream(chatId, messages, signal) {
        const localUser = getLocalUser()
        const settings = loadSettings()
        const approvedTools = getApprovedToolsForChat(chatId)
        const response = await fetch("/chat/stream", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "x-chocks-user-id": localUser.id,
            "x-chocks-display-name": localUser.displayName,
            "x-chocks-full-access": settings.fullAccess ? "true" : "false",
            "x-chocks-permission-mode": settings.permissionMode,
            "x-chocks-approved-tools": approvedTools.join(","),
          },
          signal,
          body: JSON.stringify({
            chatId,
            userId: localUser.id,
            displayName: localUser.displayName,
            fullAccess: settings.fullAccess,
            permissionMode: settings.permissionMode,
            approvedTools,
            messages,
          }),
        })

        if (!response.ok || !response.body) {
          const errText = await response.text()
          throw new Error(`${response.status} ${errText}`)
        }

        const decoder = new TextDecoder()
        let buffer = ""

        const applyAssistantUpdate = (updater) => {
          const chats = loadChats()
          const chat = chats.find((item) => item.id === chatId)
          if (!chat) return
          const lastMessage = chat.messages[chat.messages.length - 1]
          if (!lastMessage || lastMessage.role !== "agent") return
          updater(lastMessage)
          saveChats(chats)
          renderApp()
        }

        const reader = response.body.getReader()
        while (true) {
          const { value, done } = await reader.read()
          if (done) break
          buffer += decoder.decode(value, { stream: true })

          while (buffer.includes("\n\n")) {
            const boundary = buffer.indexOf("\n\n")
            const rawEvent = buffer.slice(0, boundary)
            buffer = buffer.slice(boundary + 2)

            const lines = rawEvent.split("\n")
            const eventLine = lines.find((line) => line.startsWith("event:"))
            const dataLine = lines.find((line) => line.startsWith("data:"))
            if (!eventLine || !dataLine) continue

            const eventName = eventLine.slice(6).trim()
            let payload = {}
            try {
              payload = JSON.parse(dataLine.slice(5).trim())
            } catch {
              payload = {}
            }

            if (eventName === "text-delta") {
              applyAssistantUpdate((message) => {
                message.content = `${message.content || ""}${payload.delta || ""}`
                message.streaming = true
              })
            }

            if (eventName === "trace") {
              applyAssistantUpdate((message) => {
                message.trace = [...(message.trace || []), payload]
                message.streaming = true
              })
              loadWorkflowStatus(chatId)
            }

            if (eventName === "done") {
              applyAssistantUpdate((message) => {
                message.content = message.content || payload.output_text || ""
                message.trace = payload.trace || message.trace || []
                message.streaming = false
              })
              loadWorkflowStatus(chatId)
            }

            if (eventName === "error") {
              throw new Error(payload.error || "stream failed")
            }
          }
        }
      }

      async function submitMessage(text, kind) {
        if (isStreaming) {
          activeStreamAbortController?.abort()
          return
        }

        const attachments = kind === "welcome" ? welcomeAttachments : chatAttachments
        const attachmentBlock = formatAttachmentsForPrompt(attachments)
        const baseText = String(text || "").trim()
        const content = attachmentBlock ? `${baseText}\n\n${attachmentBlock}`.trim() : baseText
        if (!content) return

        let chat = getActiveChat()
        if (!chat) {
          chat = createChat()
          await requestJson("/conversations", {
            method: "POST",
            body: JSON.stringify({ id: chat.id, title: chat.title }),
          })
        }

        const wasEmpty = chat.messages.length === 0
        if (wasEmpty) chat.title = makeTitle(content)

        chat.messages.push({
          role: "user",
          content: baseText || "[arquivo anexado]",
          attachments: attachments.map((attachment) => ({ name: attachment.name })),
        })
        chat.messages.push({ role: "agent", content: "", trace: [], streaming: true })
        upsertChat(chat)
        renderApp()
        await persistChat(chat)
        welcomePromptEl.value = ""
        chatPromptEl.value = ""
        welcomeAttachments = []
        chatAttachments = []
        renderAttachmentList(welcomeAttachmentsEl, welcomeAttachments, "welcome")
        renderAttachmentList(chatAttachmentsEl, chatAttachments, "chat")
        setAttachmentFeedback("welcome")
        setAttachmentFeedback("chat")
        isStreaming = true
        activeStreamAbortController = new AbortController()
        syncStreamingUi()
        const requestMessages = buildApiMessages(chat)

        try {
          await consumeChatStream(chat.id, requestMessages, activeStreamAbortController.signal)
        } catch (error) {
          chat = getActiveChat() || chat
          const lastMessage = chat.messages[chat.messages.length - 1]
          if (lastMessage?.role === "agent") {
            if (String(error).includes("AbortError")) {
              lastMessage.content = `${lastMessage.content || ""}\n\n[resposta cancelada]`.trim()
            } else {
              lastMessage.content = `Erro: ${String(error)}`
            }
            lastMessage.trace = []
            lastMessage.streaming = false
          } else {
            chat.messages.push({ role: "agent", content: `Erro: ${String(error)}`, trace: [], streaming: false })
          }
          upsertChat(chat)
          await persistChat(chat)
          renderApp()
        } finally {
          isStreaming = false
          activeStreamAbortController = null
          const latestChat = getActiveChat()
          const latestMessage = latestChat?.messages?.[latestChat.messages.length - 1]
          if (latestMessage?.role === "agent") {
            latestMessage.streaming = false
            upsertChat(latestChat)
            await persistChat(latestChat)
          }
          syncStreamingUi()
          loadWorkflowStatus(chat.id)
          renderApp()
        }
      }

      function handlePromptKeydown(event, textarea) {
        if (event.key === "Enter" && !event.shiftKey) {
          event.preventDefault()
          submitMessage(textarea.value, textarea === welcomePromptEl ? "welcome" : "chat")
        }
      }

      welcomeSendEl.addEventListener("click", () => submitMessage(welcomePromptEl.value, "welcome"))
      chatSendEl.addEventListener("click", () => submitMessage(chatPromptEl.value, "chat"))
      fullAccessToggleEl.addEventListener("click", () => toggleFullAccess())

      welcomePromptEl.addEventListener("keydown", (event) => handlePromptKeydown(event, welcomePromptEl))
      chatPromptEl.addEventListener("keydown", (event) => handlePromptKeydown(event, chatPromptEl))

      newChatButtonEl.addEventListener("click", async () => {
        try {
          const nextChat = createChat()
          await requestJson("/conversations", {
            method: "POST",
            body: JSON.stringify({ id: nextChat.id, title: nextChat.title }),
          })
          welcomePromptEl.value = ""
          chatPromptEl.value = ""
          setWorkspaceMode("conversations")
          await loadWorkflowStatus(nextChat.id)
          renderApp()
        } catch (error) {
          showToast(`Erro: ${String(error)}`)
        }
      })

      shareButtonEl.addEventListener("click", () => {
        shareCurrentChat()
      })

      profileButtonEl.addEventListener("click", () => {
        openSettingsOverlay()
      })

      profileIconButtonEl.addEventListener("click", () => {
        openSettingsOverlay()
      })

      toggleSidebarButtonEl.addEventListener("click", () => {
        setSidebarCollapsed(!isSidebarCollapsed())
        applySidebarState()
      })

      welcomeAttachEl.addEventListener("click", () => {
        openFilePicker("welcome")
      })

      chatAttachEl.addEventListener("click", () => {
        openFilePicker("chat")
      })

      welcomeFileInputEl.addEventListener("change", (event) => {
        handleFileSelection(event, "welcome")
      })

      chatFileInputEl.addEventListener("change", (event) => {
        handleFileSelection(event, "chat")
      })

      searchButtonEl.addEventListener("click", () => {
        if (searchOpen) closeSearch(true)
        else openSearch()
        renderApp()
        if (searchOpen) searchInputEl.focus()
      })

      searchInputEl.addEventListener("input", () => {
        searchQuery = searchInputEl.value.trim()
        renderRecentList()
      })

      settingsCancelEl.addEventListener("click", () => {
        settingsOverlayEl.hidden = true
        syncNavButtons()
      })

      settingsSaveEl.addEventListener("click", async () => {
        saveSettings({
          displayName: settingsDisplayNameEl.value.trim() || "bsilv",
          welcomeTitle: settingsWelcomeTitleEl.value.trim() || "Bem-vindo ao Chocks",
          planLabel: settingsPlanLabelEl.value.trim() || "Plano local",
          permissionMode: settingsPermissionModeEl.value || "ask",
          fullAccess: !!settingsFullAccessEl.checked,
        })
        syncLocalUserDisplayName()
        settingsOverlayEl.hidden = true
        syncNavButtons()
        await loadToolStatuses()
        renderApp()
      })

      settingsOverlayEl.addEventListener("click", (event) => {
        if (event.target === settingsOverlayEl) {
          settingsOverlayEl.hidden = true
          syncNavButtons()
        }
      })

      // Rename Modal Handlers
      let renameCallback = null

      function openRenameModal(currentPath, callback) {
        renameCallback = callback
        renameCurrentEl.value = currentPath
        renameNewEl.value = ""
        renameOverlayEl.hidden = false
        renameNewEl.focus()
      }

      renameCancelEl.addEventListener("click", () => {
        renameOverlayEl.hidden = true
        renameCallback = null
        renameNewEl.value = ""
      })

      renameConfirmEl.addEventListener("click", () => {
        const newPath = renameNewEl.value.trim()
        if (newPath && renameCallback) {
          renameCallback(newPath)
        }
        renameOverlayEl.hidden = true
        renameCallback = null
        renameNewEl.value = ""
      })

      renameNewEl.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          renameConfirmEl.click()
        } else if (event.key === "Escape") {
          renameCancelEl.click()
        }
      })

      renameOverlayEl.addEventListener("click", (event) => {
        if (event.target === renameOverlayEl) {
          renameCancelEl.click()
        }
      })

      document.addEventListener("click", (event) => {
        const target = event.target
        if (!(target instanceof Element)) return
        if (target.closest(".recent-item")) return
        if (openMenuChatId !== null) {
          openMenuChatId = null
          renderRecentList()
        }
      })

      workspaceButtons.forEach((button) => {
        button.addEventListener("click", () => {
          closeSearch(false)
          openMenuChatId = null
          setWorkspaceMode(button.dataset.workspace)
          renderApp()
        })
      })

      suggestionChipEls.forEach((button) => {
        button.addEventListener("click", () => {
          applySuggestionPrompt(button.getAttribute("data-suggestion") || "")
        })
      })

      async function initApp() {
        syncLocalUserDisplayName()
        applySettingsToUi()
        applySidebarState()
        syncStreamingUi()
        fileBrowserState = loadFileBrowserState()
        filePreviewState = loadFilePreviewState()

        try {
          const chats = await migrateLegacyChatsIfNeeded()
          if (chats.length === 0) {
            const firstChat = createChat()
            await requestJson("/conversations", {
              method: "POST",
              body: JSON.stringify({ id: firstChat.id, title: firstChat.title }),
            })
            await refreshChatsFromServer()
          }

          renderApp()
          await Promise.all([loadToolStatuses(), loadWorkflowStatus()])
          renderApp()
        } catch (error) {
          console.error(error)
          showToast("Nao foi possivel carregar as conversas do servidor")
          if (loadChats().length === 0) {
            createChat()
          }
          renderApp()
        }
      }

      initApp()
    </script>
  </body>
